  <span><kbd>⌘↵</kbd> run</span>
  <span><kbd>⌘K</kbd> focus</span>
  <span><kbd>tab</kbd> indent</span>
  <span><kbd>esc</kbd> blur/cancel</span>
  <span class="spacer"></span>
  <span class="ver">robin · surrealdb</span>
</footer>

<script type="module">
'use strict';
import { compactFieldDef, parseHash, hashFromState, matchesQuery, detectRecordLink, compareValues, parseFilterExpression, dedupeHistory, parseAutocompleteContext } from '/db/static/browse-utils.js';
import { SAVED } from '/db/static/browse-saved.js';


const WRITE_RE = /\b(CREATE|UPDATE|UPSERT|DELETE|INSERT|RELATE|REMOVE|DEFINE|ALTER|REBUILD)\b/i;
const STORAGE_KEY = 'robin-db:last-query';
const FILTER_KEY = 'robin-db:t-filter';
const VIEW_KEY = 'robin-db:view';

const $ = (id) => document.getElementById(id);
const sqlEl = $('sql'), runEl = $('run'), cancelEl = $('cancel'), copyEl = $('copy'), csvEl = $('csv');
const statsEl = $('stats'), resultsEl = $('results');
const warnEl = $('warn'), tabTable = $('tab-table'), tabJson = $('tab-json');
const brandUrl = $('brand-url'), brandStatus = $('brand-status'), brandTables = $('brand-tables');
const tFilter = $('t-filter');
const sidebarToggle = $('sidebar-toggle'), scrim = $('scrim');
const archBtn = $('arch-btn'), archOverlay = $('arch-overlay'), archClose = $('arch-close');
const archTitle = $('arch-title'), archIntro = $('arch-intro'), archLayers = $('arch-layers');
const cardHost = $('table-card-host');

let lastResponse = null;
let viewMode = 'table';
const RENDER_CAP = 2000;
const PAGE_SIZE = 100;
const pageState = new Map();  // statement-index -> page (0-based)
const sortState = new Map();  // statement-index -> [{ key, dir }]  // dir: 'asc'|'desc', max 2 entries
const filterState = new Map();  // statement-index -> { col -> raw filter input string }
let filtersVisible = false;
const HISTORY_KEY = 'robin-db:history';
let queryHistory = []; // loaded from localStorage at startup
let historyCursor = -1; // -1 = textarea has its own content; otherwise index into queryHistory
let historyDraft = ''; // cached unsaved typing while cycling
let modalLastFocus = null;
let activeAbort = null;
let elapsedTimer = null;
const trail = { entries: [], pos: -1 }; // entries: [{ state, label }]
let descriptions = {};
let layers = {};
const COLLAPSE_KEY = 'robin-db:sidebar-collapsed';
let lastTable = null; // currently-displayed table for the card
let archCache = null;
let archLastFocus = null;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)');

function setBodyState(state) {
  document.body.classList.remove('connecting', 'running', 'errored');
  if (state) document.body.classList.add(state);
}

function fmtCount(n) {
  if (n == null) return '';
  if (n < 1_000) return String(n);
  if (n < 1_000_000) return (n / 1_000).toFixed(n < 10_000 ? 1 : 0) + 'k';
  return (n / 1_000_000).toFixed(1) + 'M';
}

function withTransition(fn) {
  if (document.startViewTransition && !reduceMotion.matches) {
    const t = document.startViewTransition(fn);
    // Swallow the abort rejection that fires when a newer transition
    // (e.g., rapid card swaps) supersedes this one. View Transitions exposes
    // three promises and any of them can reject on abort — silence all three
    // so the console stays clean during fast user navigation.
    t.finished.catch(() => {});
    t.ready.catch(() => {});
    t.updateCallbackDone.catch(() => {});
  } else {
    fn();
  }
}

function setSidebar(open) {
  document.body.classList.toggle('sidebar-open', open);
  sidebarToggle.setAttribute('aria-expanded', String(open));
  if (open) {
    const first = $('sidebar').querySelector('button, input');
    if (first) first.focus({ preventScroll: true });
  } else if (document.activeElement && $('sidebar').contains(document.activeElement)) {
    sidebarToggle.focus({ preventScroll: true });
  }
}

function openModal(title, contentNode) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').replaceChildren(contentNode);
  modalLastFocus = document.activeElement;
  document.body.classList.add('modal-open');
  document.getElementById('modal-overlay').focus({ preventScroll: true });
}
function closeModal() {
  if (!document.body.classList.contains('modal-open')) return;
  document.body.classList.remove('modal-open');
  if (modalLastFocus && document.contains(modalLastFocus)) modalLastFocus.focus({ preventScroll: true });
  modalLastFocus = null;
}

function readHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function writeHistory(arr) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch {}
}

const USER_SAVED_KEY = 'robin-db:user-saved';
let userSaved = []; // [{ id, label, description, sql, createdAt }]

const fieldsCache = new Map();   // tableName -> { fields: string[] } (resolved data)
const fieldsInflight = new Map(); // tableName -> Promise<{fields}>
let acItems = [];      // current popover items
let acSelected = -1;   // index into acItems
let acAnchor = null;   // textarea cursor position when popover opened

function readUserSaved() {
  try {
    const raw = localStorage.getItem(USER_SAVED_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function writeUserSaved(arr) {
  try { localStorage.setItem(USER_SAVED_KEY, JSON.stringify(arr)); } catch {}
}

function renderSidebar({ tables, counts, descriptions: descs, layers: layerMap }) {
  descriptions = descs ?? {};
  layers = layerMap ?? {};
  const groupsEl = $('saved-groups');
  const groupsFrag = document.createDocumentFragment();

  // Overview as its own pseudo-group at the very top of the sidebar.
  const ov = findOverview();
  if (ov) {
    const ovWrap = document.createElement('div');
    ovWrap.className = 'group';
    const ovH2 = document.createElement('h2');
    ovH2.textContent = ' ';
    ovH2.style.minHeight = '0.5rem';
    ovWrap.appendChild(ovH2);
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.label = 'overview';
    b.dataset.desc = ov.item.description ?? '';
    const labelEl = document.createElement('span');
    labelEl.className = 'q-label';
    labelEl.textContent = 'overview';
    const snipEl = document.createElement('span');
    snipEl.className = 'desc-snippet';
    b.append(labelEl, snipEl);
    b.title = ov.item.description ?? '';
    b.addEventListener('click', () => selectSaved(ov.group, ov.item));
    ovWrap.appendChild(b);
    groupsFrag.appendChild(ovWrap);
  }

  // View group above schema. Each item renders a synthesized View page
  // (Dashboard/Analysis/Trends/Inventory) in the editor pane.
  const viewWrap = document.createElement('div');
  viewWrap.className = 'group';
  const viewH2 = document.createElement('h2');
  viewH2.textContent = 'view';
  viewWrap.appendChild(viewH2);
  for (const p of [
    { label: 'dashboard', desc: 'What Robin currently knows about you and what is fresh' },
    { label: 'analysis',  desc: 'Non-obvious surfaces about your data' },
    { label: 'trends',    desc: 'How activity, knowledge, and behavior change over time' },
    { label: 'inventory', desc: 'Plain-language map of every table Robin stores' },
  ]) {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.label = p.label;
    b.dataset.desc = p.desc;
    const labelEl = document.createElement('span');
    labelEl.className = 'q-label';
    labelEl.textContent = p.label;
    const snipEl = document.createElement('span');
    snipEl.className = 'desc-snippet';
    b.append(labelEl, snipEl);
    b.title = p.desc;
    b.addEventListener('click', () => selectViewPage(p.label));
    viewWrap.appendChild(b);
  }
  groupsFrag.appendChild(viewWrap);

  for (const grp of SAVED) {
    const wrap = document.createElement('div');
    wrap.className = 'group';
    const h2 = document.createElement('h2');
    h2.textContent = grp.group;
    wrap.appendChild(h2);
    for (const q of grp.items) {
      // Overview is rendered as its own pseudo-group at the top of the sidebar
      // (see above). Skip it here so it doesn't appear under "schema" too.
      if (q.kind === 'page' && q.label === 'overview') continue;
      const b = document.createElement('button');
      b.type = 'button';
      b.dataset.label = q.label;
      b.dataset.desc = q.description ?? '';
      const labelEl = document.createElement('span');
      labelEl.className = 'q-label';
      labelEl.textContent = q.label;
      const snipEl = document.createElement('span');
      snipEl.className = 'desc-snippet';
      b.append(labelEl, snipEl);
      b.title = q.sql ?? q.description ?? '';
      b.addEventListener('click', () => selectSaved(grp.group, q));
      wrap.appendChild(b);
    }
    groupsFrag.appendChild(wrap);
  }
  groupsEl.replaceChildren(groupsFrag);

  $('t-count').textContent = tables.length ? String(tables.length) : '';
  brandTables.textContent = tables.length ? `${tables.length} tables` : '';

  const LAYER_ORDER = [
    { id: 'L1', name: 'captures' },
    { id: 'L2', name: 'episodes' },
    { id: 'L3', name: 'entities & edges' },
    { id: 'L4', name: 'reflection' },
    { id: 'OP', name: 'operational' },
    { id: null, name: 'other' },
  ];
  const collapsed = readCollapsed();
  const tEl = $('tables');
  const tFrag = document.createDocumentFragment();
  for (const layer of LAYER_ORDER) {
    const inLayer = tables.filter((t) => (layers[t] ?? null) === layer.id);
    if (!inLayer.length) continue;
    const group = document.createElement('div');
    group.className = 'group layer';
    group.dataset.layer = layer.id ?? 'other';
    if (collapsed.has(layer.id ?? 'other')) group.classList.add('collapsed');
    const h2 = document.createElement('h2');
    h2.setAttribute('role', 'button');
    h2.setAttribute("tabindex", "0");
    h2.setAttribute('aria-expanded', String(!group.classList.contains('collapsed')));
    if (layer.id) {
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = layer.id;
      h2.appendChild(pill);
    }
    h2.appendChild(document.createTextNode(layer.name));
    const cnt = document.createElement('span');
    cnt.className = 'count';
    cnt.textContent = `· ${inLayer.length}`;
    h2.appendChild(cnt);
    const dot = document.createElement('span');
    dot.className = 'layer-active-dot';
    dot.setAttribute('aria-hidden', 'true');
    h2.appendChild(dot);
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '▾';
    h2.appendChild(arrow);
    h2.addEventListener('click', () => toggleLayerCollapse(group, layer.id ?? 'other'));
    h2.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleLayerCollapse(group, layer.id ?? 'other');
      }
    });
    group.appendChild(h2);
    const body = document.createElement('div');
    body.className = 'layer-body';
    for (const t of inLayer) {
      const b = document.createElement('button');
      b.type = 'button';
      b.dataset.name = t;
      const name = document.createElement('span');
      name.className = 't-name';
      name.textContent = t;
      const count = document.createElement('span');
      count.className = 'row-count';
      count.textContent = fmtCount(counts?.[t]);
      const snip = document.createElement('span');
      snip.className = 'desc-snippet';
      b.append(name, count, snip);
      if (descriptions[t]) b.title = descriptions[t];
      b.addEventListener('click', () => selectTable(t));
      body.appendChild(b);
    }
    group.appendChild(body);
    tFrag.appendChild(group);
  }
  tEl.replaceChildren(tFrag);
  applyTableFilter(tFilter.value);
}

function renderUserSaved() {
  let host = document.getElementById('user-saved-group');
  if (!host) {
    host = document.createElement('div');
    host.className = 'group';
    host.id = 'user-saved-group';
    const h2 = document.createElement('h2');
    h2.textContent = 'saved (yours)';
    host.appendChild(h2);
    const savedGroups = document.getElementById('saved-groups');
    savedGroups.parentNode.insertBefore(host, savedGroups);
  }
  while (host.children.length > 1) host.removeChild(host.lastChild);
  if (!userSaved.length) {
    host.style.display = 'none';
    return;
  }
  host.style.display = '';
  for (const item of userSaved) {
    const row = document.createElement('div');
    row.className = 'user-saved-item';
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.label = item.label;
    b.dataset.desc = item.description ?? '';
    const labelEl = document.createElement('span');
    labelEl.className = 'q-label';
    labelEl.textContent = item.label;
    const snipEl = document.createElement('span');
    snipEl.className = 'desc-snippet';
    b.append(labelEl, snipEl);
    b.title = item.description ?? item.sql;
    b.addEventListener('click', () => {
      lastTable = null;
      sqlEl.value = item.sql;
      checkWrite();
      renderSavedCard('saved (yours)', { label: item.label, description: item.description, sql: item.sql, tables: [] });
      run();
    });
    const menu = document.createElement('button');
    menu.type = 'button';
    menu.className = 'menu-btn';
    menu.textContent = '⋯';
    menu.setAttribute('aria-label', `actions for ${item.label}`);
    menu.addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Delete saved query "${item.label}"?`)) {
        userSaved = userSaved.filter((u) => u.id !== item.id);
        writeUserSaved(userSaved);
        renderUserSaved();
      }
    });
    row.append(b, menu);
    host.appendChild(row);
  }
}

function readCollapsed() {
  try {
    const raw = localStorage.getItem(COLLAPSE_KEY);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    return new Set(Array.isArray(arr) ? arr : []);
  } catch { return new Set(); }
}

function writeCollapsed(set) {
  try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...set])); } catch {}
}

function toggleLayerCollapse(groupEl, key) {
  const collapsed = readCollapsed();
  const isCollapsed = groupEl.classList.toggle('collapsed');
  groupEl.querySelector('h2').setAttribute('aria-expanded', String(!isCollapsed));
  if (isCollapsed) collapsed.add(key); else collapsed.delete(key);
  writeCollapsed(collapsed);
}

// Render `text` into `host` with the matched substring wrapped in <mark class="q">.
function renderHighlighted(host, text, range) {
  host.replaceChildren();
  if (!range) { host.textContent = text; return; }
  const [a, b] = range;
  if (a > 0) host.appendChild(document.createTextNode(text.slice(0, a)));
  const mark = document.createElement('mark');
  mark.className = 'q';
  mark.textContent = text.slice(a, b);
  host.appendChild(mark);
  if (b < text.length) host.appendChild(document.createTextNode(text.slice(b)));
}

function applyTableFilter(query) {
  const q = (query || '').trim();
  let nTables = 0;
  let nQueries = 0;

  // Tables
  for (const b of $('tables').querySelectorAll('button')) {
    const name = b.dataset.name ?? '';
    const desc = descriptions[name] ?? '';
    const nameMatch = matchesQuery(name, q);
    const descMatch = nameMatch.match ? { match: false, range: null } : matchesQuery(desc, q);
    const show = nameMatch.match || descMatch.match;
    b.classList.toggle('hidden', !show);
    if (show) {
      nTables += 1;
      const nameEl = b.querySelector('.t-name');
      if (nameEl) renderHighlighted(nameEl, name, nameMatch.match ? nameMatch.range : null);
      const snip = b.querySelector('.desc-snippet');
      if (snip) {
        if (descMatch.match) {
          renderHighlighted(snip, makeSnippet(desc, descMatch.range), shiftRange(descMatch.range, desc));
        } else {
          snip.replaceChildren();
        }
      }
    }
  }

  // Saved queries (within #saved-groups)
  for (const b of $('saved-groups').querySelectorAll('button')) {
    const label = b.dataset.label ?? '';
    const desc = b.dataset.desc ?? '';
    const labelMatch = matchesQuery(label, q);
    const descMatch = labelMatch.match ? { match: false, range: null } : matchesQuery(desc, q);
    const show = labelMatch.match || descMatch.match;
    b.classList.toggle('hidden', !show);
    if (show) {
      nQueries += 1;
      const labelEl = b.querySelector('.q-label');
      if (labelEl) renderHighlighted(labelEl, label, labelMatch.match ? labelMatch.range : null);
      const snip = b.querySelector('.desc-snippet');
      if (snip) {
        if (descMatch.match) {
          renderHighlighted(snip, makeSnippet(desc, descMatch.range), shiftRange(descMatch.range, desc));
        } else {
          snip.replaceChildren();
        }
      }
    }
  }

  // Per-layer + per-saved-group: hide groups with zero visible items.
  // When a filter is active, also auto-expand any layer group that contains
  // a match — otherwise the user sees "1 table" in the counter but the
  // matching button is invisible inside a collapsed layer.
  const allGroups = [
    ...$('saved-groups').querySelectorAll('.group'),
    ...$('tables').querySelectorAll('.group.layer'),
  ];
  const filterActive = q.length > 0;
  const collapsedSet = readCollapsed();
  for (const grp of allGroups) {
    const anyVisible = Array.from(grp.querySelectorAll('button')).some((b) => !b.classList.contains('hidden'));
    grp.classList.toggle('hidden-group', !anyVisible);
    // Only layer groups have collapse state; saved-query groups are always expanded.
    if (!grp.classList.contains('layer')) continue;
    const key = grp.dataset.layer ?? 'other';
    if (filterActive && anyVisible) {
      // Force-expand for the duration of the filter; remember to restore on clear.
      grp.classList.remove('collapsed');
      grp.querySelector('h2').setAttribute('aria-expanded', 'true');
    } else if (!filterActive && collapsedSet.has(key)) {
      // Filter cleared — restore the user's saved collapsed state.
      grp.classList.add('collapsed');
      grp.querySelector('h2').setAttribute('aria-expanded', 'false');
    }
  }

  // Counter
  const counter = $('t-filter-counter');
  if (q) counter.textContent = `${nTables} tables · ${nQueries} queries`;
  else counter.textContent = '';

  // Empty hint inside the tables list (preserve existing behaviour).
  let hint = $('tables').querySelector('.empty-hint');
  if (q && nTables === 0) {
    if (!hint) {
      hint = document.createElement('div');
      hint.className = 'empty-hint';
      $('tables').appendChild(hint);
    }
    hint.replaceChildren();
    hint.appendChild(document.createTextNode(`No tables matching "${q}". `));
    const clr = document.createElement('button');
    clr.type = 'button';
    clr.className = 'empty-hint-action';
    clr.textContent = 'clear filter';
    clr.addEventListener('click', () => { tFilter.value = ''; tFilter.dispatchEvent(new Event('input')); });
    hint.appendChild(clr);
  } else if (hint) {
    hint.remove();
  }
}

// Build a <=80-char snippet centred on the matched range.
function makeSnippet(text, range, max = 80) {
  if (!range) return text.slice(0, max);
  const [a, b] = range;
  const span = b - a;
  const half = Math.max(0, Math.floor((max - span) / 2));
  const start = Math.max(0, a - half);
  const end = Math.min(text.length, start + max);
  let s = text.slice(start, end);
  if (start > 0) s = '…' + s;
  if (end < text.length) s = s + '…';
  return s;
}

// Translate a range expressed against the original text into the snippet.
function shiftRange(range, text, max = 80) {
  if (!range) return null;
  const snip = makeSnippet(text, range, max);
  const i = snip.toLowerCase().indexOf(text.slice(range[0], range[1]).toLowerCase());
  return i < 0 ? null : [i, i + (range[1] - range[0])];
}

// Skeleton constructors. Returns a DOM node ready to insert; visually
// indicates loading via shimmer. aria-busy is set on the parent by the caller;

function makeSkeletonLine(width) {

  s.setAttribute('aria-hidden', 'true');

  return s;
}
function makeSkeletonRows(n = 5) {
  const wrap = document.createElement('div');
  wrap.setAttribute('aria-hidden', 'true');
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');

      const bar = document.createElement('span');

}
function makeSkeletonCard() {

  wrap.className = 'skeleton-card';

function makePlaceholder(text, opts = {}) {

function setActiveRoute(state) {
  // Clear all current highlights.
  for (const b of document.querySelectorAll('aside button.active-route')) {
    b.classList.remove('active-route');
  }
  for (const g of document.querySelectorAll('#tables .group.layer.is-active-layer')) {
    g.classList.remove('is-active-layer');
  }
  if (!state || !state.kind) return;
  if (state.kind === 'table') {
    const b = document.querySelector(`#tables button[data-name="${CSS.escape(state.name)}"]`);
    if (b) {
      b.classList.add('active-route');
      // Walk up to the layer group and add the active-layer dot.
      const grp = b.closest('.group.layer');
      if (grp) grp.classList.add('is-active-layer');
    }
  } else if (state.kind === 'overview' || state.kind === 'saved') {
    const targetLabel = state.kind === 'overview' ? 'overview' : state.label;
    for (const b of document.querySelectorAll('#saved-groups button')) {
      if (b.dataset.label === targetLabel) { b.classList.add('active-route'); break; }
    }
    // No layer dot — saved queries aren't "in" a layer.
  }
}

function navigate(state, opts = {}) {
  const hash = hashFromState(state);
  const cur = location.hash || '#';
  if (hash !== cur) {
    if (opts.replace) history.replaceState(state, '', hash);
    else history.pushState(state, '', hash);
  }
  // Push to trail on every navigation that has a card kind — including the
  // initial replace-state load (so the trail starts with 'overview' before
  // the user navigates anywhere). Dismiss (kind: null) is excluded.
  if (state && state.kind) pushTrail(state);
  setActiveRoute(state);
}

function trailLabelForState(s) {
  if (!s || !s.kind) return null;
  if (s.kind === 'overview') return 'overview';
  if (s.kind === 'table')    return s.name;
  if (s.kind === 'saved')    return s.label;
  return null;
}

function pushTrail(state) {
  const label = trailLabelForState(state);
  if (label == null) return;
  // Linear / browser-style: replace forward stack on a new branch.
  trail.entries = trail.entries.slice(0, trail.pos + 1);
  // Avoid duplicate consecutive entries.
  const last = trail.entries[trail.entries.length - 1];
  if (last && last.label === label) return;
  trail.entries.push({ state, label });
  trail.pos = trail.entries.length - 1;
  renderTrail();
}

function moveTrailTo(label) {
  // Called from popstate so we know the location changed but don't know which way.
  // Find the most recent entry matching label and move pos to it.
  for (let i = trail.entries.length - 1; i >= 0; i--) {
    if (trail.entries[i].label === label) { trail.pos = i; renderTrail(); return; }
  }
}

function renderTrail() {
  const el = document.getElementById('trail');
  el.replaceChildren();
  const visibleCount = Math.min(trail.pos + 1, 5);
  if (visibleCount <= 1) { document.body.classList.remove('has-trail'); return; }
  document.body.classList.add('has-trail');
  const start = (trail.pos + 1) - visibleCount;
  if (start > 0) {
    const dots = document.createElement('span');
    dots.className = 'ellipsis';
    dots.textContent = '…';
    el.appendChild(dots);
  }
  for (let i = start; i <= trail.pos; i++) {
    if (i > start) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      el.appendChild(sep);
    }
    const entry = trail.entries[i];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'step' + (i === trail.pos ? ' current' : '');
    btn.textContent = entry.label;
    if (i !== trail.pos) {
      const target = entry.state;
      btn.addEventListener('click', () => {
        navigate(target);
        // The popstate listener doesn't fire for pushState, so route now.
        routeFromHash();
      });
    }
    el.appendChild(btn);
  }
}

async function selectTable(t, opts = {}) {
  lastTable = t;
  navigate({ kind: 'table', name: t });
  document.body.classList.remove('page-mode');
  sqlEl.value = opts.sql || `SELECT * FROM ${t} LIMIT 100;`;
  checkWrite();
  if (window.matchMedia('(max-width: 720px)').matches) setSidebar(false);
  // Run the query AND fetch the table card in parallel so neither blocks the other.
  const cardPromise = fetchAndShowCard(t);
  await run();
  await cardPromise;
}

async function renderViewInto(wrap, name, ctx = {}) {
  try {
    const mod = await import('/db/static/browse-view.js');
    if (ctx.entity) {
      // Profile view consumes ?entity= from URL search params.
      const u = new URL(location);
      u.searchParams.set('entity', ctx.entity);
      history.replaceState(history.state, '', u);
    }
    await mod.activate(wrap, name);
  } catch (err) {
    console.error('view page render failed', err);
    wrap.innerHTML = `<p style="color:#c66">Failed to load view page: ${String(err?.message ?? err)}</p>`;
  }
}

// Delegated click handler — page modules emit anchors with ?tab=view|workbench
// query strings. Intercept and route them into the appropriate handler so the
// page doesn't actually navigate.
document.body.addEventListener('click', (e) => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href') || '';
  if (!href.includes('tab=')) return;
  let u;
  try { u = new URL(href, location.origin); } catch { return; }
  const tab = u.searchParams.get('tab');
  const page = u.searchParams.get('page');
  const entity = u.searchParams.get('entity');
  const table = u.searchParams.get('table');
  if (tab === 'view' && page === 'entity' && entity) {
    e.preventDefault();
    selectViewEntity(entity);
  } else if (tab === 'view' && page) {
    e.preventDefault();
    selectViewPage(page);
  } else if (tab === 'workbench' && table) {
    e.preventDefault();
    selectTable(table);
  }
});

function selectSaved(group, item) {
  lastTable = null;
  // Page-kind items are routed by their label so deep-linking works for both
  // 'overview' (page) and concrete saved queries.
  navigate(item.label === 'overview' && item.kind === 'page'
    ? { kind: 'overview' }
    : { kind: 'saved', group, label: item.label });
  if (window.matchMedia('(max-width: 720px)').matches) setSidebar(false);
  if (item.kind === 'page') {
    document.body.classList.add('page-mode');
    renderPageCard(group, item);
    statsEl.textContent = '';
    lastResponse = null;
    copyEl.disabled = true;
    csvEl.disabled = true;
    return;
  }
  document.body.classList.remove('page-mode');
  sqlEl.value = item.sql;
  checkWrite();
  renderSavedCard(group, item);
  run();
}

function renderPageCard(group, item) {
  const wrap = document.createElement('div');
  wrap.className = 't-card page';

  const eyebrow = document.createElement('div');
  eyebrow.className = 'eyebrow';
  eyebrow.append(text('overview'), sep(), text(group));
  wrap.appendChild(eyebrow);

  const head = document.createElement('div');
  head.className = 'head';
  const h1 = document.createElement('h1');
  h1.textContent = item.label;
  head.appendChild(h1);
  const dismiss = document.createElement('button');
  dismiss.className = 'dismiss';
  dismiss.type = 'button';
  dismiss.setAttribute('aria-label', 'dismiss page');
  dismiss.textContent = '×';
  dismiss.addEventListener('click', clearTableCard);
  head.appendChild(dismiss);
  wrap.appendChild(head);

  if (item.description) {
    const p = document.createElement('div');
    p.className = 'purpose';
    p.textContent = item.description;
    wrap.appendChild(p);
  }

  for (const sec of item.sections ?? []) {
    if (sec.heading) {
      const h = document.createElement('h2');
      h.className = 'page-h';
      h.textContent = sec.heading;
      wrap.appendChild(h);
    }
    if (sec.body) {
      const b = document.createElement('div');
      b.className = 'page-body';
      b.textContent = sec.body;
      wrap.appendChild(b);
    }
    if (sec.diagram === 'layers' && Array.isArray(sec.layers)) {
      wrap.appendChild(renderLayersDiagram(sec.layers));
    }
    if (Array.isArray(sec.list) && sec.list.length) {
      const ul = document.createElement('ul');
      ul.className = 'page-list';
      for (const li of sec.list) {
        const item = document.createElement('li');
        item.textContent = li;
        ul.appendChild(item);
      }
      wrap.appendChild(ul);
    }
    if (Array.isArray(sec.chips) && sec.chips.length) {
      const chips = document.createElement('div');
      chips.className = 'chips';
      for (const t of sec.chips) {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'chip';
        c.textContent = t;
        c.title = descriptions[t] ?? '';
        c.addEventListener('click', () => selectTable(t));
        chips.appendChild(c);
      }
      wrap.appendChild(chips);
    }
  }

  // Build TOC if we have enough sections.
  const headings = wrap.querySelectorAll('.page-h');
  if (headings.length >= 4) {
    wrap.classList.add('has-toc');

    // Mobile collapse at top of card.
    const mobile = document.createElement('details');
    mobile.className = 'toc-mobile';
    const summary = document.createElement('summary');
    summary.textContent = 'sections';
    mobile.appendChild(summary);
    headings.forEach((h, i) => {
      const id = `sec-${i}`;
      h.id = id;
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        scrollToSection(id);
        mobile.open = false;
      });
      mobile.appendChild(a);
    });
    // Insert mobile TOC right after the head.
    const headEl = wrap.querySelector('.head');
    headEl.insertAdjacentElement('afterend', mobile);

    // Desktop sticky TOC on the right.
    const toc = document.createElement('div');
    toc.className = 'toc';
    headings.forEach((h, i) => {
      const id = `sec-${i}`;
      h.id = id;
      const link = document.createElement('button');
      link.type = 'button';
      link.className = 'toc-link';
      link.dataset.target = id;
      link.textContent = h.textContent;
      link.addEventListener('click', () => scrollToSection(id));
      toc.appendChild(link);
    });
    // Insert TOC as the FIRST child so float-right works and content wraps around it.
    wrap.insertBefore(toc, wrap.firstChild);
  }

  withTransition(() => cardHost.replaceChildren(wrap));

  // Active-section highlight via IntersectionObserver.
  // Root is the card host (the actual scroll container).
  if (headings.length >= 4) {
    setupTocObserver();
  }
}

function scrollToSection(id) {
  const target = document.getElementById(id);
  if (!target) return;
  const host = cardHost;
  const targetRect = target.getBoundingClientRect();
  const hostRect = host.getBoundingClientRect();
  host.scrollTo({ top: host.scrollTop + (targetRect.top - hostRect.top) - 12, behavior: 'smooth' });
}

let tocObserver = null;
function setupTocObserver() {
  if (tocObserver) tocObserver.disconnect();
  const headings = cardHost.querySelectorAll('.page-h');
  tocObserver = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {
        const id = e.target.id;
        for (const link of cardHost.querySelectorAll('.toc-link')) {
          link.classList.toggle('active', link.dataset.target === id);
        }
      }
    }
  }, { root: cardHost, rootMargin: '0px 0px -75% 0px', threshold: 0 });
  headings.forEach((h) => tocObserver.observe(h));
}

function renderLayersDiagram(layers) {
  const wrap = document.createElement('div');
  wrap.className = 'layers-diagram';
  layers.forEach((layer, idx) => {
    const block = document.createElement('div');
    block.className = 'layer-block';
    const badge = document.createElement('div');
    badge.className = 'layer-badge';
    badge.textContent = layer.id;
    const content = document.createElement('div');
    content.className = 'layer-content';
    const name = document.createElement('div');
    name.className = 'layer-name';
    name.textContent = layer.name;
    content.appendChild(name);
    if (layer.summary) {
      const sum = document.createElement('div');
      sum.className = 'layer-summary';
      sum.textContent = layer.summary;
      content.appendChild(sum);
    }
    if (Array.isArray(layer.tables) && layer.tables.length) {
      const chips = document.createElement('div');
      chips.className = 'chips';
      for (const t of layer.tables) {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'chip';
        c.textContent = t;
        c.title = descriptions[t] ?? '';
        c.addEventListener('click', () => selectTable(t));
        chips.appendChild(c);
      }
      content.appendChild(chips);
    }
    block.append(badge, content);
    wrap.appendChild(block);

    // Connector arrow + transition label between layers.
    if (layer.transition && idx < layers.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'layer-arrow';
      const glyph = document.createElement('span');
      glyph.className = 'glyph';
      glyph.textContent = '↓';
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = layer.transition;
      arrow.append(glyph, label);
      wrap.appendChild(arrow);
    }
  });
  return wrap;
}

// Heuristic: a single-table SELECT/INFO statement → that table.
const SINGLE_FROM_RE = /\bfrom\s+`?([a-z_][a-z0-9_]*)`?/gi;
const INFO_FOR_TABLE_RE = /\binfo\s+for\s+table\s+`?([a-z_][a-z0-9_]*)`?/i;
function detectSingleTable(sql) {
  const trimmed = sql.trim();
  if (!trimmed) return null;
  const info = INFO_FOR_TABLE_RE.exec(trimmed);
  if (info) return info[1];
  // Strip line/block comments before scanning.
  const cleaned = trimmed.replace(/--[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
  const matches = new Set();
  for (const m of cleaned.matchAll(SINGLE_FROM_RE)) matches.add(m[1].toLowerCase());
  if (matches.size === 1) return [...matches][0];
  return null;
}

async function fetchAndShowCard(t) {
  // Show a fast placeholder card immediately so the page reacts; if the
  // fetch is slow, swap to a fuller skeleton after 200ms.
  renderTableCard({ name: t, meta: null, schema: null, count: null, _loading: true });
  cardHost.setAttribute('aria-busy', 'true');
  const skeletonTimer = setTimeout(() => {
    cardHost.replaceChildren(makeSkeletonCard());
  }, 200);
  try {
    const r = await fetch(`/db/api/table/${encodeURIComponent(t)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderTableCard(data);
  } catch (e) {
    renderTableCard({ name: t, meta: null, schema: { error: String(e?.message ?? e) }, count: null });
  } finally {
    clearTimeout(skeletonTimer);
    cardHost.removeAttribute('aria-busy');
  }
}

function renderTableCard(info) {
  const wrap = document.createElement('div');
  wrap.className = 't-card';

  const head = document.createElement('div');
  head.className = 'head';

  head.append(layer, h1);
  if (info.count != null) {
    const rc = document.createElement('span');
    rc.className = 'row-count';
    rc.textContent = `${fmtCount(info.count)} rows`;
    head.appendChild(rc);
  }
  const dismiss = document.createElement('button');
  dismiss.className = 'dismiss';
  dismiss.type = 'button';
  dismiss.setAttribute('aria-label', 'dismiss table info');

  if (info._loading) {

    if (Array.isArray(info.meta.samples) && info.meta.samples.length) {
      wrap.appendChild(sectionLabel('starter queries'));

        c.className = 'chip sample';
        c.textContent = s.label;
        c.title = s.sql;
        c.addEventListener('click', () => { sqlEl.value = s.sql; checkWrite(); run(); });
        chips.appendChild(c);
      }
      wrap.appendChild(chips);
    }
    if (Array.isArray(info.meta.related) && info.meta.related.length) {
      wrap.appendChild(sectionLabel('related tables'));
      const chips = document.createElement('div');
      chips.className = 'chips';
      for (const r of info.meta.related) {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'chip';
        c.textContent = r;
        c.title = descriptions[r] ?? '';
        c.addEventListener('click', () => selectTable(r));
        chips.appendChild(c);
      }
      wrap.appendChild(chips);
    }
  } else {
    const p = document.createElement('div');
    p.className = 'purpose';
    p.textContent = info.name.startsWith('_')
      ? 'Internal bookkeeping table.'
      : 'No description available for this table yet.';
    wrap.appendChild(p);
  }

  if (info.schema?.fields?.length) {
    wrap.appendChild(sectionLabel(`schema (${info.schema.fields.length} fields)`));
    const grid = document.createElement('div');
    grid.className = 'fields';
    for (const f of info.schema.fields) {
      const fn = document.createElement('div');
      fn.className = 'fn';
      fn.textContent = f.name;
      const fd = document.createElement('div');
      fd.className = 'fd';
      fd.textContent = f.def || '';
      grid.append(fn, fd);
    }
    wrap.appendChild(grid);
  }
  if (info.schema?.indexes?.length) {
    wrap.appendChild(sectionLabel(`indexes (${info.schema.indexes.length})`));
    const list = document.createElement('div');
    list.className = 'indexes';
    for (const i of info.schema.indexes) {
      const row = document.createElement('div');
      const code = document.createElement('code');
      code.textContent = i.def;
      row.appendChild(code);
      list.appendChild(row);
    }
    wrap.appendChild(list);
  }

  withTransition(() => cardHost.replaceChildren(wrap));
}

function clearTableCard() {
  lastTable = null;
  withTransition(() => cardHost.replaceChildren());
  document.body.classList.remove('page-mode');
  if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
  navigate({ kind: null }, { replace: true });
}

function tableExists(name) {
  return Object.prototype.hasOwnProperty.call(descriptions, name);
}

function sectionLabel(text) {
  const el = document.createElement('div');
  el.className = 'section-label';
  el.textContent = text;
  return el;
}

function startElapsed() {
  const t0 = performance.now();
  stopElapsed();
  elapsedTimer = setInterval(() => {
    const ms = Math.round(performance.now() - t0);
    statsEl.textContent = `${ms} ms…`;
  }, 100);
}
function stopElapsed() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

let historyIndicatorTimer = null;
function showHistoryIndicator(text) {
  let ind = document.querySelector('.editor-wrap .history-indicator');
  if (!ind) {
    ind = document.createElement('div');
    ind.className = 'history-indicator';
    ind.setAttribute('aria-live', 'polite');
    document.querySelector('.editor-wrap').appendChild(ind);
  }
  ind.textContent = text;
  ind.classList.add('show');
  clearTimeout(historyIndicatorTimer);
  historyIndicatorTimer = setTimeout(() => ind.classList.remove('show'), 1500);
}

function setRunning(on) {
  runEl.disabled = on;
  if (on) {
    runEl.setAttribute('aria-busy', 'true');
    cancelEl.classList.remove('hidden');
  } else {
    runEl.removeAttribute('aria-busy');
    cancelEl.classList.add('hidden');
  }
}

async function run() {
  const sql = sqlEl.value.trim();
  if (!sql) return;
  pageState.clear();
  sortState.clear();
  filterState.clear();
  // Auto-detect a single-table query and show its card if no card is up.
  const detected = detectSingleTable(sql);
  if (detected && detected !== lastTable && !cardHost.children.length && tableExists(detected)) {
    lastTable = detected;
    fetchAndShowCard(detected);
  }
  if (activeAbort) activeAbort.abort();
  activeAbort = new AbortController();
  const myAbort = activeAbort;
  setRunning(true);
  setBodyState('running');
  brandStatus.textContent = 'running';
  startElapsed();
  // Schedule skeleton after 200ms — most local queries finish faster and
  // never flash a skeleton. resultsEl gets aria-busy while pending.
  resultsEl.setAttribute('aria-busy', 'true');
  const skeletonTimer = setTimeout(() => {
    if (myAbort !== activeAbort) return;
    resultsEl.replaceChildren(makeSkeletonRows(5));
  }, 200);
  copyEl.disabled = true;
  csvEl.disabled = true;
  copyEl.classList.remove('success');
  copyEl.textContent = 'copy';
  try {
    const r = await fetch('/db/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql }),
      signal: myAbort.signal,
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    lastResponse = data;
    stopElapsed();
    statsEl.replaceChildren(...formatStats(data));
    setBodyState(null);
    brandStatus.textContent = `${data.ms} ms`;
    try { localStorage.setItem(STORAGE_KEY, sql); } catch {}
    queryHistory = dedupeHistory(queryHistory, sql);
    writeHistory(queryHistory);
    historyCursor = -1;
    historyDraft = '';
    copyEl.disabled = false;
    csvEl.disabled = !hasTabularResult(data);
    withTransition(render);
  } catch (e) {
    stopElapsed();
    if (e?.name === 'AbortError') {
      statsEl.textContent = 'cancelled';
      setBodyState(null);
      brandStatus.textContent = 'cancelled';
      withTransition(() => resultsEl.replaceChildren(makePlaceholder('Cancelled.')));
      lastResponse = null;
      return;
    }
    statsEl.textContent = '';
    setBodyState('errored');
    brandStatus.textContent = 'error';
    withTransition(() => resultsEl.replaceChildren(makePlaceholder(String(e.message ?? e), { isErr: true })));
    lastResponse = null;
  } finally {
    clearTimeout(skeletonTimer);
    resultsEl.removeAttribute('aria-busy');
    if (activeAbort === myAbort) {
      activeAbort = null;
      setRunning(false);
    }
  }
}

function hasTabularResult(data) {
  return data.responses.some((r) => r.success && Array.isArray(r.result) && r.result.length
    && r.result.every((x) => x && typeof x === 'object' && !Array.isArray(x)));
}

function cancel() {
  if (activeAbort) activeAbort.abort();
}

async function copyResults() {
  if (!lastResponse) return;
  let text;
  if (viewMode === 'json') {
    text = JSON.stringify(lastResponse.responses, null, 2);
  } else {
    text = lastResponse.responses.map((r, i) => {
      if (!r.success) return `[${i + 1}] ERROR\n${r.error}`;
      const v = r.result;
      if (Array.isArray(v) && v.length && v.every((x) => x && typeof x === 'object' && !Array.isArray(x))) {
        const keys = Array.from(v.reduce((s, row) => { Object.keys(row).forEach((k) => s.add(k)); return s; }, new Set()));
        const cell = (x) => x == null ? '' : (typeof x === 'string' || typeof x === 'number' || typeof x === 'boolean') ? String(x) : JSON.stringify(x);
        const lines = [keys.join('\t')];
        for (const row of v) lines.push(keys.map((k) => cell(row[k])).join('\t'));
        return `[${i + 1}] ${v.length} rows\n${lines.join('\n')}`;
      }
      return `[${i + 1}]\n${JSON.stringify(v, null, 2)}`;
    }).join('\n\n');
  }
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    copyEl.classList.add('success');
    copyEl.textContent = 'copied';
    setTimeout(() => {
      copyEl.classList.remove('success');
      copyEl.textContent = 'copy';
    }, 1200);
  } catch {
    copyEl.textContent = 'copy failed';
    setTimeout(() => { copyEl.textContent = 'copy'; }, 1200);
  }
}

function formatStats(data) {
  const counts = data.responses.map((r) => Array.isArray(r.result) ? r.result.length : (r.success ? 'ok' : '!'));
  const parts = [
    text(`${data.responses.length}`, 'em'), ' stmt ', sep(),
    text(`${counts.join('+')}`, 'em'), ' rows ', sep(),
    text(`${data.ms}`, 'em'), ' ms',
  ];
  return parts.map((p) => typeof p === 'string' ? document.createTextNode(p) : p);
}
function text(t, cls) {
  const el = document.createElement('span');
  if (cls) el.className = cls;
  el.textContent = t;
  return el;
}
function sep() {
  const s = document.createElement('span');
  s.className = 'sep';
  s.textContent = '·';
  return s;
}

function render() {
  if (!lastResponse) return;
  if (viewMode === 'json') return renderJson();
  renderTable();
}

function renderJson() {
  const pre = document.createElement('pre');
  pre.className = 'json';
  pre.textContent = JSON.stringify(lastResponse.responses, null, 2);
  resultsEl.replaceChildren(pre);
}

function renderTable() {
  const frag = document.createDocumentFragment();
  lastResponse.responses.forEach((r, i) => {
    const header = document.createElement('div');
    header.className = 'stmt-header' + (r.success ? '' : ' err');
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = `[${i + 1}]`;
    const main = document.createElement('span');
    main.textContent = r.success
      ? (Array.isArray(r.result) ? `${r.result.length} rows` : 'ok')
      : 'error';
    const meta = document.createElement('span');
    meta.className = 'meta';
    if (r.stats?.execution_time) meta.textContent = r.stats.execution_time;
    header.append(label, main, meta);
    frag.appendChild(header);

    if (!r.success) {
      const p = document.createElement('div');
      p.className = 'err-message';
      p.textContent = r.error;
      frag.appendChild(p);
      return;
    }
    const v = r.result;
    if (Array.isArray(v) && v.length && v.every((x) => x && typeof x === 'object' && !Array.isArray(x))) {
      // Apply render cap.
      let rows = v;
      if (rows.length > RENDER_CAP) {
        const banner = document.createElement('div');
        banner.className = 'render-cap-banner';
        banner.textContent = `Showing first ${RENDER_CAP} of ${rows.length} rows. Add LIMIT to your query, or fetch more. Sort/filter applies to the displayed rows only.`;
        frag.appendChild(banner);
        rows = rows.slice(0, RENDER_CAP);
      }
      // Pagination: if more than PAGE_SIZE rows, paginate.
      if (rows.length > PAGE_SIZE) {
        const totalPages = Math.ceil(rows.length / PAGE_SIZE);
        let page = pageState.get(i) ?? 0;
        if (page >= totalPages) { page = 0; pageState.set(i, 0); }
        const start = page * PAGE_SIZE;
        const slice = rows.slice(start, start + PAGE_SIZE);
        frag.appendChild(buildTable(slice, i));
        frag.appendChild(buildPager(i, page, totalPages, rows.length));
      } else {
        frag.appendChild(buildTable(rows, i));
      }
    } else if (Array.isArray(v) && v.length === 0) {
      frag.appendChild(makePlaceholder('No rows.', {
        actionLabel: 'edit query',
        onAction: () => sqlEl.focus(),
      }));
    } else {
      const pre = document.createElement('pre');
      pre.className = 'json';
      pre.textContent = JSON.stringify(v, null, 2);
      frag.appendChild(pre);
    }
  });
  resultsEl.replaceChildren(frag);
}

function buildTable(rows, stmtIdx = 0) {
  const keys = Array.from(rows.reduce((s, r) => { Object.keys(r).forEach((k) => s.add(k)); return s; }, new Set()));
  // Detect columns where the first non-null value is an array of length > 32 — sort disabled.
  const sortDisabled = new Set();
  for (const k of keys) {
    for (const row of rows) {
      const v = row[k];
      if (v == null) continue;
      if (Array.isArray(v) && v.length > 32) sortDisabled.add(k);
      break;
    }
  }
  // Filter type inference per column. 'numeric' if every non-null value is a
  // number or numeric string; 'boolean' if every non-null is boolean;
  // otherwise 'text'.
  const colType = {};
  for (const k of keys) {
    let allNum = true, allBool = true, hasAny = false;
    for (const row of rows) {
      const v = row[k];
      if (v == null) continue;
      hasAny = true;
      if (typeof v !== 'number' && !(typeof v === 'string' && v !== '' && !isNaN(Number(v)))) allNum = false;
      if (typeof v !== 'boolean') allBool = false;
      if (!allNum && !allBool) break;
    }
    colType[k] = !hasAny ? 'text' : (allNum ? 'numeric' : (allBool ? 'boolean' : 'text'));
  }
  // Apply filters BEFORE sort.
  let view = applyFilters(rows, keys, colType, stmtIdx);
  // Apply sort.
  const sorts = sortState.get(stmtIdx) ?? [];
  if (sorts.length) {
    view = [...view].sort((a, b) => {
      for (const s of sorts) {
        const c = compareValues(a[s.key], b[s.key]);
        if (c !== 0) return s.dir === 'desc' ? -c : c;
      }
      return 0;
    });
  }

  const t = document.createElement('table');
  const thead = document.createElement('thead');
  const tr = document.createElement('tr');
  for (const k of keys) {
    const th = document.createElement('th');
    th.scope = 'col';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sort-btn' + (sortDisabled.has(k) ? ' no-sort' : '');
    btn.appendChild(document.createTextNode(k));
    const sortEntry = sorts.find((s) => s.key === k);
    if (sortEntry) {
      const ind = document.createElement('span');
      ind.className = 'sort-indicator';
      ind.textContent = sortEntry.dir === 'asc' ? '▲' : '▼';
      btn.appendChild(ind);
      th.setAttribute('aria-sort', sortEntry.dir === 'asc' ? 'ascending' : 'descending');
    } else {
      th.setAttribute('aria-sort', 'none');
    }
    if (sortDisabled.has(k)) {
      btn.title = 'column has large array values, sort disabled';
    } else {
      btn.addEventListener('click', (e) => toggleSort(stmtIdx, k, e.shiftKey));
    }
    th.appendChild(btn);
    tr.appendChild(th);
  }
  thead.appendChild(tr);
  if (filtersVisible) {
    const fr = document.createElement('tr');
    fr.className = 'filter-row';
    const filters = filterState.get(stmtIdx) ?? {};
    for (const k of keys) {
      const td = document.createElement('td');
      if (colType[k] === 'boolean') {
        const cur = filters[k] ?? '';
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'bool-pill';
        pill.setAttribute('aria-label', `filter ${k} (boolean)`);
        pill.textContent = cur === 'true' ? '✓ true' : cur === 'false' ? '✗ false' : '· any';
        pill.addEventListener('click', () => {
          const next = cur === '' ? 'true' : cur === 'true' ? 'false' : '';
          const map = filterState.get(stmtIdx) ?? {};
          map[k] = next;
          filterState.set(stmtIdx, map);
          withTransition(render);
        });
        td.appendChild(pill);
      } else {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = colType[k] === 'numeric' ? '>10' : 'filter…';
        inp.value = filters[k] ?? '';
        inp.setAttribute('aria-label', `filter ${k}`);
        inp.addEventListener('input', () => {
          const map = filterState.get(stmtIdx) ?? {};
          map[k] = inp.value;
          filterState.set(stmtIdx, map);
          withTransition(render);
        });
        td.appendChild(inp);
      }
      fr.appendChild(td);
    }
    thead.appendChild(fr);
  }
  t.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (const row of view) {
    const r = document.createElement('tr');
    for (const k of keys) {
      const td = document.createElement('td');
      const v = row[k];
      if (v == null) {
        td.classList.add('cell-null');
        td.textContent = '—';
      } else {
        const display = (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean')
          ? String(v) : JSON.stringify(v);
        const link = detectRecordLink(display);
        if (link) {
          const lbtn = document.createElement('button');
          lbtn.type = 'button';
          lbtn.className = 'record-link';
          lbtn.textContent = display;
          lbtn.title = `navigate to ${link.table}:${link.id}`;
          lbtn.addEventListener('click', (e) => {
            e.stopPropagation();
            selectTable(link.table, { sql: `SELECT * FROM ${display};` });
          });
          td.appendChild(lbtn);
        } else {
          const span = document.createElement('span');
          span.className = 'truncate';
          span.textContent = display;
          td.appendChild(span);
          td.title = display;
          td.addEventListener('click', () => td.classList.toggle('expanded'));
        }
      }
      r.appendChild(td);
    }
    tbody.appendChild(r);
  }
  t.appendChild(tbody);
  return t;
}

function toggleSort(stmtIdx, key, isShift) {
  const cur = sortState.get(stmtIdx) ?? [];
  const existing = cur.find((s) => s.key === key);
  let next;
  if (isShift) {
    // Shift-click: add as secondary sort, max 2 entries total.
    if (existing) {
      // Cycle: asc → desc → remove (drop just this one, keep others).
      if (existing.dir === 'asc') { existing.dir = 'desc'; next = cur; }
      else next = cur.filter((s) => s.key !== key);
    } else {
      next = [...cur, { key, dir: 'asc' }];
      if (next.length > 2) next.shift();  // cap at 2; drop the oldest
    }
  } else {
    // Plain click: replaces sorts. Cycle asc → desc → no-sort.
    if (existing && cur.length === 1) {
      if (existing.dir === 'asc') { existing.dir = 'desc'; next = cur; }
      else next = [];
    } else {
      next = [{ key, dir: 'asc' }];
    }
  }
  sortState.set(stmtIdx, next);
  withTransition(render);
}

function applyFilters(rows, keys, colType, stmtIdx) {
  const filters = filterState.get(stmtIdx);
  if (!filters) return rows;
  const parsed = {};
  for (const k of keys) {
    const raw = filters[k];
    if (raw == null || raw === '') continue;
    if (colType[k] === 'boolean') {
      parsed[k] = raw === 'true' ? true : raw === 'false' ? false : null;
    } else {
      parsed[k] = parseFilterExpression(raw);
    }
  }
  if (!Object.keys(parsed).length) return rows;
  return rows.filter((row) => {
    for (const k of Object.keys(parsed)) {
      const v = row[k];
      const f = parsed[k];
      if (colType[k] === 'boolean') {
        if (f === null) continue;
        if (v !== f) return false;
        continue;
      }
      if (!f) continue;
      if (f.kind === 'numeric' && colType[k] === 'numeric') {
        const n = typeof v === 'number' ? v : (typeof v === 'string' && v !== '' && !isNaN(Number(v)) ? Number(v) : null);
        if (n === null) return false;
        if (f.op === '..') { if (n < f.min || n > f.max) return false; }
        else if (f.op === '>' && !(n > f.value)) return false;
        else if (f.op === '<' && !(n < f.value)) return false;
        else if (f.op === '>=' && !(n >= f.value)) return false;
        else if (f.op === '<=' && !(n <= f.value)) return false;
        else if (f.op === '=' && !(n === f.value)) return false;
      } else {
        const text = f.kind === 'text' ? f.text : String(f.value ?? `${f.min}..${f.max}`);
        const sv = v == null ? '' : String(v);
        if (!sv.toLowerCase().includes(text.toLowerCase())) return false;
      }
    }
    return true;
  });
}

function buildPager(stmtIdx, currentPage, totalPages, totalRows) {
  const wrap = document.createElement('div');
  wrap.className = 'pager';
  const info = document.createElement('span');
  info.className = 'info';
  info.append(
    'Page ',
    text(String(currentPage + 1), 'em'),
    ' of ',
    text(String(totalPages), 'em'),
    ' · ',
    text(`${PAGE_SIZE} per page`, 'em'),
    ' · ',
    text(`${totalRows} rows`, 'em'),
  );
  wrap.appendChild(info);
  const prev = document.createElement('button');
  prev.type = 'button';
  prev.textContent = 'prev';
  prev.disabled = currentPage === 0;
  prev.addEventListener('click', () => {
    pageState.set(stmtIdx, Math.max(0, currentPage - 1));
    withTransition(render);
  });
  const next = document.createElement('button');
  next.type = 'button';
  next.textContent = 'next';
  next.disabled = currentPage >= totalPages - 1;
  next.addEventListener('click', () => {
    pageState.set(stmtIdx, Math.min(totalPages - 1, currentPage + 1));
    withTransition(render);
  });
  wrap.append(prev, next);
  return wrap;
}

function setTab(mode) {
  if (viewMode === mode) return;
  viewMode = mode;
  const tableSelected = mode === 'table';
  tabTable.setAttribute('aria-selected', String(tableSelected));
  tabJson.setAttribute('aria-selected', String(!tableSelected));
  resultsEl.setAttribute('aria-labelledby', tableSelected ? 'tab-table' : 'tab-json');
  try { localStorage.setItem(VIEW_KEY, mode); } catch {}
  withTransition(render);
}

function downloadCsv() {
  if (!lastResponse) return;
  const rs = lastResponse.responses
    .filter((r) => r.success && Array.isArray(r.result) && r.result.length
      && r.result.every((x) => x && typeof x === 'object' && !Array.isArray(x)));
  if (!rs.length) return;
  const esc = (v) => {
    if (v == null) return '';
    const s = (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') ? String(v) : JSON.stringify(v);
    return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const parts = rs.map((r, i) => {
    const keys = Array.from(r.result.reduce((s, row) => { Object.keys(row).forEach((k) => s.add(k)); return s; }, new Set()));
    const lines = [keys.join(',')];
    for (const row of r.result) lines.push(keys.map((k) => esc(row[k])).join(','));
    return rs.length > 1 ? `# statement ${i + 1}\n${lines.join('\n')}` : lines.join('\n');
  });
  const blob = new Blob([parts.join('\n\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.download = `robin-db-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function fetchFieldsFor(table) {
  if (fieldsCache.has(table)) return fieldsCache.get(table);
  if (fieldsInflight.has(table)) return fieldsInflight.get(table);
  const p = (async () => {
    try {
      const r = await fetch(`/db/api/table/${encodeURIComponent(table)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const fields = Array.isArray(data?.schema?.fields)
        ? data.schema.fields.map((f) => f.name)
        : [];
      const out = { fields };
      fieldsCache.set(table, out);
      return out;
    } catch {
      const out = { fields: [] };
      fieldsCache.set(table, out);
      return out;
    } finally {
      fieldsInflight.delete(table);
    }
  })();
  fieldsInflight.set(table, p);
  return p;
}

function matchesAcPrefix(name, prefix) {
  if (!prefix) return true;
  return name.toLowerCase().startsWith(prefix.toLowerCase()) ||
         name.toLowerCase().includes(prefix.toLowerCase());
}

function rankAcItems(names, prefix) {
  return names
    .filter((n) => matchesAcPrefix(n, prefix))
    .sort((a, b) => {
      const pa = a.toLowerCase().startsWith(prefix.toLowerCase()) ? 0 : 1;
      const pb = b.toLowerCase().startsWith(prefix.toLowerCase()) ? 0 : 1;
      if (pa !== pb) return pa - pb;
      return a.localeCompare(b);
    })
    .slice(0, 8);
}

function closeAc() {
  const pop = document.getElementById('ac-popover');
  pop.classList.remove('show');
  sqlEl.setAttribute('aria-expanded', 'false');
  sqlEl.removeAttribute('aria-activedescendant');
  acItems = [];
  acSelected = -1;
}

function renderAcPopover(items, prefix) {
  const pop = document.getElementById('ac-popover');
  pop.replaceChildren();
  items.forEach((it, idx) => {
    const el = document.createElement('div');
    el.className = 'ac-item';
    el.id = `ac-item-${idx}`;
    el.setAttribute('role', 'option');
    el.setAttribute('aria-selected', String(idx === acSelected));
    const kind = document.createElement('span');
    kind.className = 'ac-kind';
    kind.textContent = it.kind;
    const name = document.createElement('span');
    const lo = it.name.toLowerCase();
    const pos = prefix ? lo.indexOf(prefix.toLowerCase()) : -1;
    if (pos >= 0) {
      const before = it.name.slice(0, pos);
      const mid = it.name.slice(pos, pos + prefix.length);
      const after = it.name.slice(pos + prefix.length);
      if (before) name.appendChild(document.createTextNode(before));
      const m = document.createElement('mark');
      m.textContent = mid;
      name.appendChild(m);
      if (after) name.appendChild(document.createTextNode(after));
    } else {
      name.textContent = it.name;
    }
    el.append(kind, name);
    el.addEventListener('mousedown', (e) => { e.preventDefault(); insertAc(idx); });
    pop.appendChild(el);
  });
  if (items.length) {
    pop.classList.add('show');
    sqlEl.setAttribute('aria-expanded', 'true');
    if (acSelected >= 0) sqlEl.setAttribute('aria-activedescendant', `ac-item-${acSelected}`);
    positionAcPopover();
  } else {
    closeAc();
  }
}

function positionAcPopover() {
  const pop = document.getElementById('ac-popover');
  pop.style.left = '36px';
  pop.style.top  = (sqlEl.offsetHeight + 4) + 'px';
}

async function updateAc() {
  const sql = sqlEl.value;
  const cursor = sqlEl.selectionStart;
  const ctx = parseAutocompleteContext(sql, cursor);
  if (!ctx) { closeAc(); return; }
  acAnchor = cursor;
  let names = [];
  if (ctx.kind === 'table') {
    names = Object.keys(descriptions ?? {});
  } else if (ctx.kind === 'field') {
    const data = await fetchFieldsFor(ctx.table);
    names = data.fields;
  }
  const ranked = rankAcItems(names, ctx.prefix);
  acItems = ranked.map((n) => ({ kind: ctx.kind, name: n, prefix: ctx.prefix, contextStart: cursor - ctx.prefix.length }));
  acSelected = acItems.length ? 0 : -1;
  renderAcPopover(acItems, ctx.prefix);
}

function insertAc(idx) {
  const it = acItems[idx];
  if (!it) return;
  const before = sqlEl.value.slice(0, it.contextStart);
  const after = sqlEl.value.slice(it.contextStart + it.prefix.length);
  sqlEl.value = before + it.name + after;
  const newPos = (before + it.name).length;
  sqlEl.setSelectionRange(newPos, newPos);
  closeAc();
  sqlEl.focus();
}

// — Wire-up —
runEl.addEventListener('click', run);
cancelEl.addEventListener('click', cancel);
copyEl.addEventListener('click', copyResults);
sqlEl.addEventListener('input', () => {
  checkWrite();
  updateAc();
});
sqlEl.addEventListener('blur', () => {
  setTimeout(() => closeAc(), 150);
});
sqlEl.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === ' ' && !e.metaKey) {
    e.preventDefault();
    updateAc();
    return;
  }
  // Autocomplete navigation when popover is open.
  if (acItems.length) {
    if (e.key === 'Escape') { e.preventDefault(); closeAc(); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acSelected = (acSelected + 1) % acItems.length;
      renderAcPopover(acItems, acItems[acSelected].prefix);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acSelected = (acSelected - 1 + acItems.length) % acItems.length;
      renderAcPopover(acItems, acItems[acSelected].prefix);
      return;
    }
    if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      insertAc(acSelected);
      return;
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); run(); return; }
  // Ctrl+↑/↓ cycles through history. NOT Cmd because that's the textarea's
  // native cursor-to-start/end shortcut on macOS.
  if (e.ctrlKey && !e.metaKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    if (queryHistory.length === 0) return;
    e.preventDefault();
    if (historyCursor === -1) historyDraft = sqlEl.value;
    if (e.key === 'ArrowUp') {
      historyCursor = historyCursor === -1 ? queryHistory.length - 1 : Math.max(0, historyCursor - 1);
    } else {
      historyCursor = historyCursor === -1 ? -1 : historyCursor + 1;
      if (historyCursor >= queryHistory.length) {
        historyCursor = -1;
        sqlEl.value = historyDraft;
        showHistoryIndicator(`history end · draft restored`);
        checkWrite();
        return;
      }
    }
    sqlEl.value = queryHistory[historyCursor].sql;
    checkWrite();
    showHistoryIndicator(`history ${queryHistory.length - historyCursor} / ${queryHistory.length}`);
    return;
  }
  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    const start = sqlEl.selectionStart, end = sqlEl.selectionEnd;
    const indent = '  ';
    sqlEl.value = sqlEl.value.slice(0, start) + indent + sqlEl.value.slice(end);
    sqlEl.selectionStart = sqlEl.selectionEnd = start + indent.length;
    return;
  }
  if (e.key === 'Escape') sqlEl.blur();
});
document.addEventListener('keydown', (e) => {
  // '/' focuses the sidebar filter (vim-style). Skip if user is typing in an
  // input/textarea or any other editable element.
  if (e.key === '/' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const a = document.activeElement;
    const editable = a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA' || a.isContentEditable);
    if (!editable) {
      e.preventDefault();
      tFilter.focus();
      tFilter.select();
      return;
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    sqlEl.focus();
    sqlEl.select();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '1') { e.preventDefault(); setTab('table'); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '2') { e.preventDefault(); setTab('json'); return; }
  if (e.key === 'Escape') {
    if (document.body.classList.contains('modal-open')) { e.preventDefault(); closeModal(); return; }
    if (document.body.classList.contains('arch-open')) { e.preventDefault(); closeArchitecture(); return; }
    if (activeAbort) { e.preventDefault(); cancel(); return; }
    if (document.body.classList.contains('sidebar-open')) { e.preventDefault(); setSidebar(false); return; }
  }
});
tabTable.addEventListener('click', () => setTab('table'));
tabJson.addEventListener('click', () => setTab('json'));
csvEl.addEventListener('click', downloadCsv);
$('filter-toggle').addEventListener('click', () => {
  filtersVisible = !filtersVisible;
  $('filter-toggle').setAttribute('aria-pressed', String(filtersVisible));
  withTransition(render);
});

$('history-btn').addEventListener('click', () => {
  const list = document.createElement('div');
  list.className = 'history-list';
  if (queryHistory.length === 0) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--fg-3)';
    empty.style.padding = '8px';
    empty.textContent = 'No history yet — run a query to populate.';
    list.appendChild(empty);
  } else {
    for (let i = queryHistory.length - 1; i >= 0; i--) {
      const entry = queryHistory[i];
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'history-item';
      const ts = document.createElement('span');
      ts.className = 'ts';
      const d = new Date(entry.ts);
      ts.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const sql = document.createElement('span');
      sql.className = 'sql';
      sql.textContent = entry.sql.replace(/\s+/g, ' ').slice(0, 200);
      sql.title = entry.sql;
      btn.append(ts, sql);
      btn.addEventListener('click', () => {
        sqlEl.value = entry.sql;
        checkWrite();
        closeModal();
        sqlEl.focus();
      });
      list.appendChild(btn);
    }
  }
  openModal(`History (${queryHistory.length}/50)`, list);
});

$('save-btn').addEventListener('click', () => openSaveModal());

function openSaveModal() {
  const wrap = document.createElement('div');
  wrap.className = 'save-modal';
  if (userSaved.length >= 30) {
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = `You have ${userSaved.length} saved queries. Consider deleting some you no longer use.`;
    wrap.appendChild(note);
  }
  const lblName = document.createElement('label');
  lblName.textContent = 'Name';
  const inpName = document.createElement('input');
  inpName.type = 'text';
  inpName.placeholder = 'short name';
  const lblDesc = document.createElement('label');
  lblDesc.textContent = 'Description (optional)';
  const inpDesc = document.createElement('textarea');
  inpDesc.placeholder = 'what this query does';
  const sqlPreview = document.createElement('pre');
  sqlPreview.className = 'sql-preview';
  sqlPreview.textContent = sqlEl.value.trim() || '(empty — type a query first)';
  const actions = document.createElement('div');
  actions.className = 'actions';
  const cancel = document.createElement('button');
  cancel.type = 'button';
  cancel.className = 'secondary';
  cancel.textContent = 'cancel';
  cancel.addEventListener('click', closeModal);
  const ok = document.createElement('button');
  ok.type = 'button';
  ok.className = 'primary';
  ok.textContent = 'save';
  ok.addEventListener('click', () => {
    const label = inpName.value.trim();
    if (!label || !sqlEl.value.trim()) { inpName.focus(); return; }
    userSaved.push({
      id: 'us-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
      label,
      description: inpDesc.value.trim() || undefined,
      sql: sqlEl.value.trim(),
      createdAt: Date.now(),
    });
    writeUserSaved(userSaved);
    closeModal();
    renderUserSaved();
  });
  actions.append(cancel, ok);
  wrap.append(lblName, inpName, lblDesc, inpDesc, sqlPreview, actions);
  openModal('Save query', wrap);
  setTimeout(() => inpName.focus(), 0);
}

tFilter.addEventListener('input', () => {
  applyTableFilter(tFilter.value);
  try { localStorage.setItem(FILTER_KEY, tFilter.value); } catch {}
});

sidebarToggle.addEventListener('click', () => setSidebar(!document.body.classList.contains('sidebar-open')));
scrim.addEventListener('click', () => setSidebar(false));

archBtn.addEventListener('click', openArchitecture);
archClose.addEventListener('click', closeArchitecture);
archOverlay.addEventListener('click', (e) => { if (e.target === archOverlay) closeArchitecture(); });

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') closeModal();
});

async function openArchitecture() {
  if (!archCache) {
    try {
      const r = await fetch('/db/api/architecture');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      archCache = await r.json();
    } catch (e) {
      archCache = { title: 'unavailable', intro: String(e?.message ?? e), layers: [] };
    }
  }
  archTitle.textContent = archCache.title ?? '—';
  archIntro.textContent = archCache.intro ?? '';
  archLayers.replaceChildren();
  for (const layer of archCache.layers ?? []) {
    const row = document.createElement('div');
    row.className = 'layer-row';
    const head = document.createElement('div');
    head.className = 'layer-head';
    const id = document.createElement('span');
    id.className = 'layer-id';
    id.textContent = layer.id;
    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = layer.name;
    head.append(id, name);
    row.appendChild(head);
    const sum = document.createElement('div');
    sum.className = 'layer-summary';
    sum.textContent = layer.summary;
    row.appendChild(sum);
    if (Array.isArray(layer.tables) && layer.tables.length) {
      const tabs = document.createElement('div');
      tabs.className = 'layer-tables';
      for (const t of layer.tables) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = t;
        b.title = descriptions[t] ?? '';
        b.addEventListener('click', () => {
          closeArchitecture();
          selectTable(t);
        });
        tabs.appendChild(b);
      }
      row.appendChild(tabs);
    }
    archLayers.appendChild(row);
  }
  archLastFocus = document.activeElement;
  document.body.classList.add('arch-open');
  archOverlay.focus({ preventScroll: true });
}

function closeArchitecture() {
  if (!document.body.classList.contains('arch-open')) return;
  document.body.classList.remove('arch-open');
  if (archLastFocus && document.contains(archLastFocus)) archLastFocus.focus({ preventScroll: true });
  archLastFocus = null;
}

// Restore last query + filter + view mode (if any). The textarea value is
// restored even though the overview is shown by default — when the user
// dismisses the overview their previous query is still there.
try {
  const last = localStorage.getItem(STORAGE_KEY);
  if (last) { sqlEl.value = last; checkWrite(); }
  const f = localStorage.getItem(FILTER_KEY);
  if (f) tFilter.value = f;
  const v = localStorage.getItem(VIEW_KEY);
  if (v === 'json' || v === 'table') {
    if (v !== 'table') setTab(v);
  }
} catch {}
queryHistory = readHistory();
userSaved = readUserSaved();
renderUserSaved();

function findOverview() {
  for (const grp of SAVED) {
    const ov = grp.items.find((i) => i.kind === 'page' && i.label === 'overview');
    if (ov) return { group: grp.group, item: ov };
  }
  return null;
}

function findSaved(group, label) {
  const grp = SAVED.find((g) => g.group === group);
  if (!grp) return null;
  const item = grp.items.find((i) => i.label === label);
  return item ? { group, item } : null;
}

function routeFromHash() {
  const r = parseHash(location.hash);
  if (r.kind === 'table') {
    if (!tableExists(r.name)) {
      // Silently fall back; don't leave a broken URL in history.
      const ov = findOverview();
      if (ov) {
        history.replaceState({ kind: 'overview' }, '', '#overview');
        selectSaved(ov.group, ov.item);
      }
      return;
    }
    selectTable(r.name);
    return;
  }
  if (r.kind === 'saved') {
    const found = findSaved(r.group, r.label);
    if (found) { selectSaved(found.group, found.item); return; }
  }
  // Default: overview. Always replace on fallback so unknown hashes never
  // stay reachable via the back button. (replace param is unused now since
  // both initial-load and popstate-fallback want the same behaviour.)
  const ov = findOverview();
  if (ov) {
    history.replaceState({ kind: 'overview' }, '', '#overview');
    selectSaved(ov.group, ov.item);
  }
}

window.addEventListener('popstate', () => {
  const r = parseHash(location.hash);
  const label = trailLabelForState(r);
  if (label != null) moveTrailTo(label);
  routeFromHash();
});

loadInfo().then(() => routeFromHash());
</script>
