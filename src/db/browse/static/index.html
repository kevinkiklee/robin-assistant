<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#050505">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="no-referrer">
<title>robin db</title>
<style>
:root {
  --bg-0: #050505;
  --bg-1: #0b0b0b;
  --bg-2: #121212;
  --bg-3: #1a1a1a;
  --line: #1d1d1d;
  --line-bright: #2a2a2a;

  --fg-0: #ececec;          /* primary text — 14.5:1 */
  --fg-1: #a8a8a8;          /* secondary  — 10:1 */
  --fg-2: #7a7a7a;          /* muted      — 5.4:1 (AA) */
  --fg-3: #6a6a6a;          /* faint label — 4.4:1 (AA-ish) */
  --fg-4: #4a4a4a;          /* decorative — fails AA, used only on borders/bullets */

  --coral: #f56742;
  --coral-d: #d64f2c;
  --coral-soft: rgba(245, 103, 66, 0.10);
  --coral-row: rgba(245, 103, 66, 0.035);

  --green: #4cce72;
  --orange: #ffb455;
  --red: #ff6363;

  --mono: ui-monospace, 'SF Mono', SFMono-Regular, 'Cascadia Mono', 'JetBrains Mono', Menlo, Consolas, monospace;

  --t-fast: 120ms;
  --t-med: 200ms;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);

  /* Typography scale — 7 tokens. Every font-size in the file references
     one of these (decorative glyphs are bumped to --fs-cap, the smallest). */
  --fs-cap:   10.5px;
  --fs-sm:    11.5px;
  --fs-md:    12.5px;
  --fs-code:  12px;
  --fs-h-sm:  14px;
  --fs-h-md:  18px;
  --fs-h-lg:  22px;

  /* Line heights */
  --lh-tight: 1.4;
  --lh-body:  1.65;
  --lh-loose: 1.75;

  --sidebar-w: 248px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }

body {
  font: var(--fs-md)/var(--lh-body) var(--mono);
  font-feature-settings: 'liga' 0, 'calt' 0;
  color: var(--fg-0);
  background: var(--bg-0);
  height: 100dvh;
  display: grid;
  grid-template-rows: 1fr auto;
  overflow: hidden;
}

::selection { background: var(--coral-soft); color: var(--fg-0); }

/* Focus rings — keyboard-only via :focus-visible. */
:where(button, textarea, input, [tabindex]):focus-visible {
  outline: 1.5px solid var(--coral);
  outline-offset: 1px;
  border-radius: 2px;
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--line-bright); background-clip: padding-box; border: 2px solid transparent; }

.sr-only {
  position: absolute !important;
  width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── LAYOUT ─────────────────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 0;
  border-bottom: 1px solid var(--line);
  position: relative;
}

#sidebar-toggle {
  display: none;
  position: fixed;
  top: 10px; left: 10px;
  z-index: 30;
  background: var(--bg-2);
  color: var(--fg-0);
  border: 1px solid var(--line-bright);
  border-radius: 4px;
  width: 36px; height: 36px;
  font-family: var(--mono);
  font-size: var(--fs-h-sm);
  cursor: pointer;
}

.scrim {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 18;
}

/* ── SIDEBAR ────────────────────────────────────────────── */
aside {
  border-right: 1px solid var(--line);
  background: var(--bg-1);
  overflow-y: auto;
  padding: 18px 0 24px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.brand {
  padding: 0 18px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-h-sm);
  font-weight: 600;
  color: var(--coral);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.brand .arrow { color: var(--coral); }
.brand .about-btn {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--line-bright);
  color: var(--fg-2);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  padding: 0 8px;
  height: 20px;
  border-radius: 99px;
  cursor: pointer;
  letter-spacing: 0.02em;
  font-weight: 500;
  transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
}
.brand .about-btn:hover { color: var(--coral); border-color: var(--coral); }

.meta {
  padding: 0 18px 16px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
  font-size: var(--fs-sm);
  color: var(--fg-2);
  line-height: var(--lh-loose);
}
.meta .row { display: flex; align-items: center; gap: 8px; }
.meta .url { color: var(--fg-1); word-break: break-all; }
.meta .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px rgba(76, 206, 114, 0.45);
  transition: background var(--t-med) var(--ease), box-shadow var(--t-med) var(--ease);
}
body.connecting .meta .dot {
  background: var(--orange);
  box-shadow: 0 0 6px rgba(255, 180, 85, 0.5);
}
body.errored .meta .dot {
  background: var(--red);
  box-shadow: 0 0 6px rgba(255, 99, 99, 0.5);
  animation: none;
}
body.running .meta .dot {
  background: var(--coral);
  box-shadow: 0 0 8px var(--coral);
  animation: pulse 0.75s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

.group { padding: 0 12px; margin-bottom: 14px; }
.group h2 {
  font-size: var(--fs-cap);
  font-weight: 500;
  color: var(--fg-3);
  padding: 0 8px 6px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.group.layer h2 {
  cursor: pointer;
  user-select: none;
  padding: 4px 8px 6px;
  gap: 6px;
}
.group.layer h2 .pill {
  display: inline-block;
  padding: 0 5px;
  border-radius: 99px;
  background: var(--coral-soft);
  color: var(--coral);
  font-weight: 600;
  font-size: var(--fs-cap);
  letter-spacing: 0.04em;
  margin-right: 4px;
}
.group.layer h2 .arrow {
  margin-left: auto;
  color: var(--fg-4);
  transition: transform var(--t-fast) var(--ease);
  font-size: var(--fs-cap);
}
.group.layer h2 .layer-active-dot {
  display: none;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--coral);
  margin-left: 6px;
  margin-right: 4px;
  box-shadow: 0 0 6px rgba(245, 103, 66, 0.5);
}
.group.layer.is-active-layer h2 .layer-active-dot { display: inline-block; }
.group.layer.collapsed h2 .arrow { transform: rotate(-90deg); }
.group.layer .layer-body {
  display: grid;
  grid-template-rows: 1fr;
  transition: grid-template-rows var(--t-med) var(--ease);
}
.group.layer.collapsed .layer-body {
  grid-template-rows: 0fr;
}
.group.layer .layer-body > * {
  min-height: 0;
  overflow: hidden;
}
.group.layer:not(.collapsed) .layer-body > * { overflow: visible; }
.group h2 .count {
  font-weight: 400;
  color: var(--fg-3);
  font-size: var(--fs-cap);
}

.t-filter-wrap { padding: 0 8px 6px; }
input.t-filter {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 3px;
  color: var(--fg-0);
  padding: 4px 8px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  outline: none;
}
input.t-filter::placeholder { color: var(--fg-3); }
input.t-filter:focus { border-color: var(--line-bright); }
.t-filter-counter {
  padding: 2px 10px 0;
  font-size: var(--fs-cap);
  color: var(--fg-3);
  font-variant-numeric: tabular-nums;
}
.t-filter-counter:empty { display: none; }
mark.q {
  background: var(--coral-soft);
  color: var(--coral);
  padding: 0;
  border-radius: 1px;
}
aside button .desc-snippet {
  display: block;
  padding: 2px 0 0 0;
  color: var(--fg-3);
  font-size: var(--fs-cap);
  font-weight: 400;
  white-space: normal;
  line-height: var(--lh-tight);
}
aside button .desc-snippet:empty { display: none; }

aside button {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
  text-align: left;
  background: none;
  border: 0;
  color: var(--fg-1);
  padding: 4px 8px;
  font-family: var(--mono);
  font-size: var(--fs-code);
  font-weight: 400;
  border-radius: 2px;
  cursor: pointer;
  transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
  animation: fadeIn 360ms var(--ease) both;
  letter-spacing: -0.005em;
}
aside button:hover { background: var(--bg-3); color: var(--fg-0); }
aside button:active { background: var(--bg-2); }
aside button.active-route {
  background: var(--bg-2);
  border-left: 2px solid var(--coral);
  padding-left: 6px; /* 8px default - 2px border keeps text aligned */
  color: var(--fg-0);
}
aside button.active-route:hover { background: var(--bg-3); }
aside button .row-count {
  font-size: var(--fs-cap);
  color: var(--fg-3);
  font-variant-numeric: tabular-nums;
}
aside button:hover .row-count { color: var(--fg-1); }
aside button.hidden { display: none; }
.empty-hint {
  padding: 6px 10px;
  font-size: var(--fs-cap);
  color: var(--fg-3);
  font-style: italic;
}
.empty-hint-action {
  background: transparent;
  border: 0;
  padding: 0;
  margin: 0;
  color: var(--coral);
  font-family: var(--mono);
  font-size: var(--fs-cap);
  font-style: italic;
  cursor: pointer;
  text-decoration: underline;
}
.empty-hint-action:hover { color: var(--coral-d); }

.user-saved-item {
  display: flex;
  align-items: center;
  gap: 4px;
  position: relative;
}
.user-saved-item .menu-btn {
  background: transparent;
  border: 0;
  color: var(--fg-3);
  cursor: pointer;
  padding: 0 4px;
  font-size: var(--fs-cap);
  line-height: 1;
}
.user-saved-item .menu-btn:hover { color: var(--coral); }

.save-modal label { display: block; font-size: var(--fs-cap); color: var(--fg-2); margin-bottom: 4px; }
.save-modal input, .save-modal textarea {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 3px;
  color: var(--fg-0);
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  outline: none;
  margin-bottom: 12px;
}
.save-modal textarea { min-height: 60px; resize: vertical; }
.save-modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.save-modal .note { color: var(--orange); font-size: var(--fs-cap); margin-bottom: 10px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-2px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── EDITOR + RESULTS ───────────────────────────────────── */
section.editor {
  display: grid;
  grid-template-rows: auto auto auto auto 1fr;
  min-height: 0;
  background: var(--bg-0);
}
#table-card-host:empty { display: none; }
#table-card-host { overflow: auto; max-height: 50vh; border-bottom: 1px solid var(--line); view-transition-name: card; }
#table-card-host:has(.t-card.page) { max-height: none; }
.trail {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 7px 18px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
  font-size: var(--fs-sm);
  color: var(--fg-3);
  flex-wrap: wrap;
}
body.has-trail .trail { display: flex; }
.trail .step {
  background: transparent;
  border: 0;
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--fg-2);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  cursor: pointer;
  transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
}
.trail .step:hover { color: var(--coral); background: var(--bg-3); }
.trail .step.current { color: var(--fg-0); cursor: default; }
.trail .sep { color: var(--fg-4); }
.trail .ellipsis { color: var(--fg-4); padding: 0 2px; }

/* Reading-page mode: hide the editor + controls + results so the page owns the screen. */
body.page-mode .editor-wrap,
body.page-mode .controls,
body.page-mode #warn,
body.page-mode .results { display: none; }
body.page-mode footer { display: none; }

.editor-wrap {
  position: relative;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
}
.prompt {
  position: absolute;
  top: 16px;
  left: 18px;
  color: var(--coral);
  font-size: var(--fs-md);
  font-weight: 500;
  pointer-events: none;
  user-select: none;
}
textarea#sql {
  display: block;
  width: 100%;
  background: transparent;
  border: 0;
  color: var(--fg-0);
  padding: 14px 22px 14px 36px;
  font-family: var(--mono);
  font-size: var(--fs-md);
  line-height: var(--lh-body);
  min-height: 110px;
  max-height: 280px;
  resize: vertical;
  outline: none;
  caret-color: var(--coral);
  tab-size: 2;
  font-feature-settings: 'liga' 0, 'calt' 0;
}
textarea#sql::placeholder { color: var(--fg-3); }

.controls {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 14px;
  padding: 9px 22px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-1);
}

button.primary, button.secondary {
  border: 0;
  padding: 5px 12px;
  border-radius: 3px;
  font-family: var(--mono);
  font-weight: 600;
  font-size: var(--fs-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  transition: background var(--t-fast) var(--ease), transform 60ms var(--ease), color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  letter-spacing: 0.01em;
  position: relative;
}
button.primary {
  background: var(--coral);
  color: #1a0d05;
}
button.primary:hover { background: var(--coral-d); }
button.primary:active { transform: translateY(1px); }
button.primary[aria-busy="true"] { padding-right: 26px; cursor: progress; }
button.primary[aria-busy="true"]::after {
  content: '';
  position: absolute;
  right: 9px; top: 50%;
  width: 9px; height: 9px;
  margin-top: -5px;
  border: 1.5px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
button.primary kbd {
  font-family: var(--mono);
  font-size: var(--fs-cap);
  background: rgba(26, 13, 5, 0.18);
  color: rgba(26, 13, 5, 0.8);
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 600;
}
button.secondary {
  background: transparent;
  color: var(--fg-2);
  border: 1px solid var(--line-bright);
  padding: 4px 10px;
  font-weight: 500;
}
button.secondary:hover { color: var(--fg-0); border-color: var(--fg-3); }
button.secondary:active { transform: translateY(1px); }
button.secondary:disabled { opacity: 0.4; cursor: not-allowed; }
button.secondary.hidden { display: none; }
button.secondary.success { color: var(--green); border-color: rgba(76, 206, 114, 0.4); }

@keyframes spin { to { transform: rotate(360deg); } }

.stats {
  font-size: var(--fs-sm);
  color: var(--fg-2);
  font-variant-numeric: tabular-nums;
}
.stats em { font-style: normal; color: var(--fg-1); }
.stats .sep { color: var(--fg-4); margin: 0 2px; }

.grow { flex: 1; }

[role="tablist"] {
  display: inline-flex;
  align-items: center;
  gap: 0;
  font-size: var(--fs-sm);
  color: var(--fg-4);
}
[role="tab"] {
  background: transparent;
  color: var(--fg-2);
  border: 0;
  padding: 4px 8px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  font-weight: 400;
  cursor: pointer;
  transition: color var(--t-fast) var(--ease);
}
[role="tab"]:hover { color: var(--fg-1); }
[role="tab"][aria-selected="true"] { color: var(--coral); }
[role="tab"][aria-selected="true"]:hover { color: var(--coral); }
.tab-sep { padding: 0 2px; }

#warn {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  padding: 0 22px;
  background: rgba(255, 180, 85, 0.06);
  color: var(--orange);
  border-bottom: 1px solid transparent;
  font-size: var(--fs-sm);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: max-height var(--t-med) var(--ease), opacity var(--t-fast) var(--ease),
              padding-top var(--t-med) var(--ease), padding-bottom var(--t-med) var(--ease),
              border-color var(--t-med) var(--ease);
}
#warn.show {
  max-height: 60px;
  opacity: 1;
  padding-top: 8px; padding-bottom: 8px;
  border-bottom-color: rgba(255, 180, 85, 0.18);
}
#warn::before { content: '!'; color: var(--orange); font-weight: 600; }

.results {
  overflow: auto;
  min-height: 0;
  background: var(--bg-0);
  view-transition-name: results;
}

.results .placeholder {
  color: var(--fg-2);
  padding: 40px 24px;
  font-size: var(--fs-md);
}
.results .placeholder.err { color: var(--red); }
.results .placeholder .hint { color: var(--fg-3); margin-right: 6px; }
.results .placeholder .kbd-hint { color: var(--fg-3); }
.results .placeholder .kbd-hint kbd {
  font-family: var(--mono);
  font-size: var(--fs-cap);
  background: var(--bg-2);
  border: 1px solid var(--line-bright);
  padding: 0 5px;
  border-radius: 2px;
  color: var(--fg-1);
}
.results .placeholder .action {
  display: inline-block;
  margin-left: 10px;
  background: transparent;
  color: var(--fg-1);
  border: 1px solid var(--line-bright);
  border-radius: 3px;
  padding: 3px 10px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  cursor: pointer;
  transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
}
.results .placeholder .action:hover { color: var(--coral); border-color: var(--coral); }
.results .placeholder .action:active { transform: translateY(1px); }

/* Skeleton loading — shimmer via animated background-position. */
@keyframes skeleton-shimmer {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}
.skeleton {
  display: inline-block;
  background: linear-gradient(
    90deg,
    var(--bg-2) 25%,
    var(--bg-3) 50%,
    var(--bg-2) 75%
  );
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.4s linear infinite;
  border-radius: 2px;
}
.skeleton-line { height: 0.95em; }
.skeleton-row {
  display: grid;
  grid-template-columns: 18% 24% 32% 26%;
  gap: 14px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.skeleton-row .skeleton { height: 1em; }
.skeleton-card {
  padding: 22px 24px 18px;
  border-left: 3px solid var(--coral);
  background: var(--bg-2);
}
.skeleton-card .skeleton-line { display: block; margin-bottom: 10px; }
.skeleton-card .skeleton-line:nth-child(1) { width: 30%; height: 0.8em; }
.skeleton-card .skeleton-line:nth-child(2) { width: 50%; height: 1.4em; margin-bottom: 14px; }
.skeleton-card .skeleton-line:nth-child(3) { width: 90%; }
.skeleton-card .skeleton-line:nth-child(4) { width: 80%; }
.skeleton-card .skeleton-line:nth-child(5) { width: 60%; }
@media (prefers-reduced-motion: reduce) {
  .skeleton { animation: none; }
}

.results .stmt-header {
  background: var(--bg-1);
  color: var(--fg-2);
  padding: 7px 22px;
  font-size: var(--fs-cap);
  font-weight: 500;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 12px;
}
.results .stmt-header:first-child { border-top: 0; }
.results .stmt-header.err { color: var(--red); }
.results .stmt-header .label { color: var(--fg-3); }
.results .stmt-header .meta {
  margin-left: auto;
  font-size: var(--fs-cap);
  color: var(--fg-3);
  font-variant-numeric: tabular-nums;
}

.results table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
  font-size: var(--fs-sm);
}
.results th, .results td {
  border-bottom: 1px solid var(--line);
  padding: 7px 14px;
  text-align: left;
  vertical-align: top;
  max-width: 480px;
}
.results th {
  background: var(--bg-1);
  color: var(--fg-2);
  font-weight: 500;
  font-size: var(--fs-cap);
  position: sticky;
  top: 31px;
  padding: 6px 14px;
  border-bottom: 1px solid var(--line-bright);
  z-index: 1;
}
.results th .sort-btn {
  background: transparent;
  border: 0;
  padding: 0;
  margin: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.results th .sort-btn:hover { color: var(--coral); }
.results th .sort-indicator { color: var(--coral); font-size: 9px; line-height: 1; }
.results th .sort-btn.no-sort { cursor: not-allowed; opacity: 0.6; }
.results th .sort-btn.no-sort:hover { color: inherit; }
.results .filter-row td {
  background: var(--bg-1);
  border-bottom: 1px solid var(--line-bright);
  padding: 4px 8px;
  position: sticky;
  top: 31px;
  z-index: 1;
}
.results .filter-row input,
.results .filter-row .bool-pill {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--fg-0);
  padding: 2px 6px;
  font-family: var(--mono);
  font-size: var(--fs-cap);
  outline: none;
}
.results .filter-row input::placeholder { color: var(--fg-3); }
.results .filter-row .bool-pill { cursor: pointer; padding: 2px 6px; }
.results .filter-row .bool-pill:hover { border-color: var(--line-bright); }
.results tbody tr:nth-child(even) { background: rgba(255, 255, 255, 0.012); }
.results tbody tr:hover { background: var(--coral-row); }
.results tbody tr:nth-child(even):hover { background: rgba(245, 103, 66, 0.05); }

.results td.cell-null { color: var(--fg-3); cursor: default; }
.results td .record-link {
  background: transparent;
  border: 0;
  padding: 0;
  margin: 0;
  font: inherit;
  color: var(--coral);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: rgba(245, 103, 66, 0.4);
  text-underline-offset: 2px;
  transition: text-decoration-color var(--t-fast) var(--ease);
}
.results td .record-link:hover { text-decoration-color: var(--coral); }
.results td .record-link:focus-visible { outline: 1.5px solid var(--coral); outline-offset: 1px; border-radius: 2px; }
.results td .truncate {
  display: inline-block;
  max-width: 460px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  vertical-align: bottom;
}
.results td.expanded .truncate {
  white-space: pre-wrap;
  word-break: break-word;
}
.results td:not(.cell-null) { cursor: pointer; }

.results pre.json {
  margin: 0;
  padding: 16px 24px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  line-height: var(--lh-body);
  white-space: pre;
  color: var(--fg-1);
  background: var(--bg-0);
}

/* Pagination + render-cap banner. */
.pager {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 22px;
  background: var(--bg-1);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  font-size: var(--fs-cap);
  color: var(--fg-2);
  font-variant-numeric: tabular-nums;
}
.pager button {
  background: transparent;
  border: 1px solid var(--line-bright);
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-cap);
  padding: 2px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
}
.pager button:hover:not(:disabled) { color: var(--coral); border-color: var(--coral); }
.pager button:disabled { opacity: 0.4; cursor: not-allowed; }
.pager .info em { font-style: normal; color: var(--fg-1); }
.render-cap-banner {
  padding: 10px 22px;
  background: rgba(255, 180, 85, 0.08);
  color: var(--orange);
  border-bottom: 1px solid rgba(255, 180, 85, 0.18);
  font-size: var(--fs-sm);
}
.render-cap-banner::before { content: '!'; color: var(--orange); font-weight: 600; margin-right: 8px; }

/* ── TABLE / PAGE CARD ──────────────────────────────────── */
.t-card {
  background: var(--bg-2);
  border-left: 3px solid var(--coral);
  padding: 22px 24px 18px;
  position: relative;
}
.t-card .eyebrow {
  font-size: var(--fs-cap);
  color: var(--fg-3);
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.t-card .eyebrow .sep { color: var(--fg-4); margin: 0 6px; }
.t-card.page { padding: 26px 28px 28px; position: relative; }
.t-card.page.has-toc { padding-right: 210px; }
.t-card.page .toc {
  float: right;
  width: 176px;
  margin-right: -198px;
  margin-bottom: 14px;
  position: sticky;
  top: 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: var(--mono);
  font-size: var(--fs-cap);
  border-left: 1px solid var(--line);
  padding-left: 12px;
}
.t-card.page .toc-link {
  background: transparent;
  border: 0;
  text-align: left;
  padding: 3px 6px;
  color: var(--fg-3);
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: var(--fs-cap);
  line-height: var(--lh-tight);
  transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
}
.t-card.page .toc-link:hover { color: var(--fg-1); background: var(--bg-3); }
.t-card.page .toc-link.active { color: var(--coral); }
.t-card.page details.toc-mobile {
  display: none;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 6px 10px;
  margin-bottom: 14px;
  font-size: var(--fs-sm);
}
.t-card.page details.toc-mobile summary {
  cursor: pointer;
  color: var(--fg-2);
  list-style: none;
}
.t-card.page details.toc-mobile summary::-webkit-details-marker { display: none; }
.t-card.page details.toc-mobile a {
  display: block;
  color: var(--fg-1);
  padding: 3px 0;
  text-decoration: none;
}
.t-card.page details.toc-mobile a:hover { color: var(--coral); }
@media (max-width: 720px) {
  .t-card.page .toc { display: none; }
  .t-card.page.has-toc { padding-right: 28px; }
  .t-card.page details.toc-mobile { display: block; }
}
.t-card .page-h {
  color: var(--coral);
  font-size: var(--fs-md);
  font-weight: 600;
  letter-spacing: 0.01em;
  margin: 22px 0 8px;
  font-family: var(--mono);
}
.t-card .page-h:first-of-type { margin-top: 18px; }
.t-card .page-body {
  color: var(--fg-1);
  font-size: var(--fs-md);
  line-height: var(--lh-loose);
  max-width: 78ch;
  margin-bottom: 6px;
  font-family: var(--mono);
}
.t-card .page-list {
  list-style: none;
  padding: 6px 0 4px 0;
  margin: 0 0 8px 0;
  max-width: 80ch;
}
.t-card .page-list li {
  position: relative;
  padding: 4px 0 4px 18px;
  color: var(--fg-1);
  font-size: var(--fs-code);
  line-height: var(--lh-loose);
  font-family: var(--mono);
}
.t-card .page-list li::before {
  content: '▸';
  position: absolute;
  left: 0;
  top: 4px;
  color: var(--coral);
  font-size: var(--fs-sm);
}

/* Layer diagram — used by the four-memory-layers section. */
.layers-diagram {
  margin: 14px 0 6px;
  max-width: 90ch;
}
.layer-block {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: var(--bg-3);
  border: 1px solid var(--line-bright);
  border-radius: 6px;
  overflow: hidden;
}
.layer-badge {
  flex: 0 0 78px;
  background: linear-gradient(180deg, rgba(245, 103, 66, 0.18), rgba(245, 103, 66, 0.06));
  color: var(--coral);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: var(--fs-h-lg);
  font-weight: 700;
  letter-spacing: 0.04em;
  border-right: 1px solid var(--line-bright);
}
.layer-content {
  flex: 1;
  padding: 14px 18px 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.layer-name {
  color: var(--fg-0);
  font-family: var(--mono);
  font-size: var(--fs-h-sm);
  font-weight: 600;
  letter-spacing: -0.005em;
}
.layer-summary {
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-code);
  line-height: var(--lh-body);
  max-width: 78ch;
}
.layer-content .chips { gap: 5px; }
.layer-content .chip {
  background: var(--bg-1);
  border-color: var(--line);
  font-size: var(--fs-cap);
  padding: 2px 8px;
}
.layer-arrow {
  display: grid;
  grid-template-columns: 78px 1fr;
  align-items: center;
  margin: 4px 0;
  color: var(--fg-3);
  font-family: var(--mono);
  font-size: var(--fs-cap);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.layer-arrow .glyph {
  text-align: center;
  font-size: var(--fs-h-md);
  color: var(--coral);
  line-height: 1;
}
.layer-arrow .label {
  padding-left: 16px;
  color: var(--fg-3);
}

/* Tighter on narrow viewports. */
@media (max-width: 720px) {
  .layer-block { flex-direction: column; }
  .layer-badge { flex: 0 0 40px; padding: 8px 0; border-right: 0; border-bottom: 1px solid var(--line-bright); font-size: var(--fs-h-sm); }
  .layer-arrow { grid-template-columns: 1fr; padding-left: 6px; }
  .layer-arrow .glyph { text-align: left; }
  .layer-arrow .label { padding-left: 6px; }
}
.t-card pre.sql-preview {
  margin: 8px 0 4px;
  padding: 9px 12px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 3px;
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  line-height: var(--lh-body);
  white-space: pre-wrap;
  word-break: break-word;
}
.t-card .head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.t-card h1 {
  font-size: var(--fs-h-lg);
  font-weight: 600;
  color: var(--fg-0);
  letter-spacing: -0.01em;
  font-family: var(--mono);
}
.t-card .layer {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 99px;
  background: var(--coral-soft);
  color: var(--coral);
  font-size: var(--fs-cap);
  font-weight: 500;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.t-card .row-count {
  margin-left: auto;
  color: var(--fg-3);
  font-size: var(--fs-sm);
  font-variant-numeric: tabular-nums;
}
.t-card .dismiss {
  background: transparent;
  border: 0;
  color: var(--fg-3);
  font-size: var(--fs-h-sm);
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}
.t-card .dismiss:hover { color: var(--fg-0); }
.t-card .purpose {
  color: var(--fg-1);
  font-size: var(--fs-md);
  line-height: var(--lh-loose);
  max-width: 78ch;
  margin-bottom: 8px;
  font-family: var(--mono);
}
.t-card .detail {
  color: var(--fg-2);
  font-size: var(--fs-sm);
  line-height: var(--lh-loose);
  max-width: 78ch;
  margin-bottom: 14px;
  font-family: var(--mono);
}
.t-card .section-label {
  color: var(--fg-3);
  font-size: var(--fs-cap);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 14px 0 6px;
}
.t-card .fields {
  display: grid;
  grid-template-columns: minmax(120px, max-content) 1fr;
  column-gap: 18px;
  row-gap: 4px;
  font-size: var(--fs-sm);
  max-width: 100%;
  overflow-x: auto;
}
.t-card .fields .fn { color: var(--coral); font-weight: 500; }
.t-card .fields .fd { color: var(--fg-1); }
.t-card .indexes {
  font-size: var(--fs-sm);
  color: var(--fg-2);
  line-height: var(--lh-loose);
  margin-top: 4px;
}
.t-card .indexes code { color: var(--fg-1); }
.t-card .chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.t-card .chip {
  background: transparent;
  border: 1px solid var(--line-bright);
  border-radius: 99px;
  padding: 3px 10px;
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  cursor: pointer;
  transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
}
.t-card .chip:hover { color: var(--coral); border-color: var(--coral); }
.t-card .chip:active { transform: translateY(1px); }
.t-card .chip.sample { background: var(--bg-2); }

/* ── ARCHITECTURE OVERLAY ───────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 40;
  display: none;
  overflow: auto;
  padding: 40px 16px;
}
body.arch-open .overlay { display: block; }

.overlay-card {
  max-width: 820px;
  margin: 0 auto;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px 32px 32px;
  position: relative;
  font-family: var(--mono);
}
.overlay-card .close {
  position: absolute;
  top: 14px;
  right: 14px;
  background: transparent;
  border: 0;
  color: var(--fg-2);
  font-size: var(--fs-h-md);
  cursor: pointer;
  line-height: 1;
}
.overlay-card .close:hover { color: var(--fg-0); }
.overlay-card h1 {
  font-size: var(--fs-h-md);
  font-weight: 600;
  color: var(--fg-0);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.overlay-card .intro {
  color: var(--fg-1);
  font-size: var(--fs-md);
  line-height: var(--lh-loose);
  margin-bottom: 20px;
  max-width: 72ch;
}
.overlay-card .layer-row {
  border-top: 1px solid var(--line);
  padding: 16px 0;
}
.overlay-card .layer-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.overlay-card .layer-id {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  background: var(--coral-soft);
  color: var(--coral);
  font-size: var(--fs-cap);
  font-weight: 600;
  letter-spacing: 0.04em;
}
.overlay-card .layer-name { font-size: var(--fs-h-sm); color: var(--fg-0); font-weight: 600; }
.overlay-card .layer-summary {
  color: var(--fg-1);
  font-size: var(--fs-code);
  line-height: var(--lh-loose);
  max-width: 72ch;
  margin-bottom: 8px;
}
.overlay-card .layer-tables { display: flex; flex-wrap: wrap; gap: 6px; }
.overlay-card .layer-tables button {
  background: var(--bg-2);
  border: 1px solid var(--line-bright);
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  border-radius: 99px;
  padding: 3px 10px;
  cursor: pointer;
  transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
}
.overlay-card .layer-tables button:hover { color: var(--coral); border-color: var(--coral); }
.overlay-card .layer-tables button:active { transform: translateY(1px); }
.overlay-card .footer-note {
  margin-top: 18px;
  color: var(--fg-3);
  font-size: var(--fs-cap);
}
.results .err-message {
  padding: 18px 24px;
  color: var(--red);
  font-size: var(--fs-sm);
  white-space: pre-wrap;
}

/* View Transitions for tab switch + re-render. */
::view-transition-old(results),
::view-transition-new(results),
::view-transition-old(card),
::view-transition-new(card) {
  animation-duration: var(--t-med);
  animation-timing-function: var(--ease);
}

/* Generic modal — used by query history + saved-as-bookmark dialogs. */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 50;
  display: none;
  overflow: auto;
  padding: 40px 16px;
}
body.modal-open .modal-overlay { display: block; }
.modal-card {
  max-width: 640px;
  margin: 0 auto;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 22px 24px 24px;
  position: relative;
  font-family: var(--mono);
}
.modal-card h2 {
  font-size: var(--fs-h-md);
  font-weight: 600;
  color: var(--fg-0);
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}
.modal-card .modal-close {
  position: absolute;
  top: 12px;
  right: 14px;
  background: transparent;
  border: 0;
  color: var(--fg-2);
  font-size: var(--fs-h-md);
  cursor: pointer;
  line-height: 1;
}
.modal-card .modal-close:hover { color: var(--fg-0); }

/* History list */
.history-list { display: flex; flex-direction: column; gap: 4px; max-height: 60vh; overflow: auto; }
.history-item {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 10px;
  padding: 6px 8px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  color: var(--fg-1);
}
.history-item:hover { background: var(--bg-2); border-color: var(--line); color: var(--fg-0); }
.history-item .ts { color: var(--fg-3); font-size: var(--fs-cap); }
.history-item .sql { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Floating "history N/50" indicator */
.history-indicator {
  position: absolute;
  right: 12px;
  bottom: 8px;
  background: var(--bg-3);
  color: var(--fg-1);
  font-family: var(--mono);
  font-size: var(--fs-cap);
  padding: 3px 8px;
  border-radius: 3px;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--t-fast) var(--ease);
}
.history-indicator.show { opacity: 1; }

/* Editor wrap is the offset parent for the indicator */
.editor-wrap { position: relative; }

/* Autocomplete popover anchored under the textarea cursor. */
.ac-popover {
  position: absolute;
  z-index: 30;
  background: var(--bg-2);
  border: 1px solid var(--line-bright);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: var(--fs-sm);
  color: var(--fg-1);
  min-width: 180px;
  max-width: 320px;
  max-height: 220px;
  overflow: auto;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
  display: none;
  padding: 4px 0;
}
.ac-popover.show { display: block; }
.ac-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  cursor: pointer;
}
.ac-item:hover, .ac-item[aria-selected="true"] { background: var(--bg-3); color: var(--fg-0); }
.ac-item .ac-kind {
  font-size: var(--fs-cap);
  color: var(--fg-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.ac-item mark { background: var(--coral-soft); color: var(--coral); padding: 0; }

/* ── FOOTER ─────────────────────────────────────────────── */
footer {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 6px 22px;
  background: var(--bg-1);
  font-size: var(--fs-cap);
  color: var(--fg-2);
  user-select: none;
}
footer span { display: inline-flex; align-items: center; gap: 6px; }
footer kbd {
  font-family: var(--mono);
  font-size: var(--fs-cap);
  background: var(--bg-2);
  border: 1px solid var(--line-bright);
  padding: 0 5px;
  border-radius: 2px;
  color: var(--fg-1);
  line-height: var(--lh-tight);
}
footer .spacer { flex: 1; }
footer .ver { color: var(--fg-3); }

/* ── MOBILE / NARROW ────────────────────────────────────── */
@media (max-width: 720px) {
  main { grid-template-columns: 1fr; }
  #sidebar-toggle { display: inline-flex; align-items: center; justify-content: center; }
  aside {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: min(280px, 86vw);
    z-index: 20;
    transform: translateX(-100%);
    transition: transform var(--t-med) var(--ease);
    box-shadow: 4px 0 24px rgba(0,0,0,0.6);
    padding-top: 56px;
  }
  body.sidebar-open aside { transform: translateX(0); }
  body.sidebar-open .scrim { display: block; }
  textarea#sql { padding-left: 24px; padding-top: 50px; min-height: 96px; }
  .prompt { top: 52px; left: 12px; }
  .controls { padding: 9px 12px; gap: 10px; }
  .results th, .results td { padding: 6px 10px; max-width: 280px; }
  .results .stmt-header { padding: 7px 12px; }
  footer { padding: 6px 12px; gap: 12px; flex-wrap: wrap; }
  footer .spacer { display: none; }
}

/* ── REDUCED MOTION ─────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  ::view-transition-old(*), ::view-transition-new(*) {
    animation: none !important;
  }
}

/* ===== Animations & transitions ===== */
@keyframes view-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes view-page-enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  @keyframes view-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes view-page-enter { from { opacity: 0; } to { opacity: 1; } }
}
.view-page { animation: view-page-enter 240ms var(--ease) both; }
.fade-in { opacity: 0; }
.fade-in.fade-in--ready { animation: view-fade-in 320ms var(--ease) both; }

/* Smooth state transitions on common interactive bits. */
#saved-groups button { transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease); }
.view-page .ra-card,
.view-page .tiles li a,
.view-page .layer-tile,
.view-page .anly-card,
.view-page .trend-card,
.view-page .inv-card,
.view-page .chip {
  transition: border-color var(--t-fast) var(--ease), color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
}
.view-page details > summary { transition: color var(--t-fast) var(--ease); }
.view-page details[open] > summary { color: var(--coral); }
.view-page .activity-table tbody tr { transition: background var(--t-fast) var(--ease); }
.view-page .activity-table tbody tr:hover { background: var(--bg-3); }

/* ===== Tooltip + View pages — match the overview page styling ===== */
.tooltip-bubble {
  position: fixed; display: none;
  background: var(--bg-3); color: var(--fg-0);
  padding: 6px 10px;
  border: 1px solid var(--line-bright);
  border-radius: 3px;
  font: var(--fs-sm)/var(--lh-tight) var(--mono);
  max-width: 320px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  z-index: 9999;
  pointer-events: none;
}

/* View page sections — inherit .t-card.page styling. Add only what's
   specific to View content. */
.view-page .dash-greet { display: grid; grid-template-columns: 1fr 280px; align-items: end; gap: 14px; margin-bottom: 18px; }
.view-page .dash-greet .freshness { color: var(--fg-2); font-size: var(--fs-sm); margin-top: 4px; }
.view-page .dash-search-wrap { position: relative; }
.view-page .dash-search { width: 100%; padding: 6px 10px; background: var(--bg-1); color: var(--fg-0); border: 1px solid var(--line-bright); border-radius: 3px; font: var(--fs-sm)/var(--lh-tight) var(--mono); }
.view-page .dash-search:focus { outline: 1.5px solid var(--coral); outline-offset: 0; }
.view-page .search-results { position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--bg-2); border: 1px solid var(--line-bright); border-radius: 3px; min-width: 240px; max-width: 360px; z-index: 100; padding: 4px 0; }
.view-page .search-results a { display: block; padding: 4px 10px; color: var(--fg-1); text-decoration: none; font-size: var(--fs-sm); }
.view-page .search-results a:hover { color: var(--coral); background: var(--bg-3); }

.view-page .about-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 6px 0; }
.view-page .about-name { font-size: var(--fs-md); color: var(--fg-0); }

.view-page .ra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; margin: 6px 0 10px; }
.view-page .ra-card { display: block; padding: 10px 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 3px; text-decoration: none; color: var(--fg-1); }
.view-page .ra-card:hover { border-color: var(--coral); transform: translateY(-1px); }
.view-page .ra-card-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.view-page .ra-card-head strong { color: var(--fg-0); }
.view-page .ra-card-meta { color: var(--fg-3); font-size: var(--fs-cap); }

/* Recent activity table (paginated) */
.view-page .activity-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); margin: 6px 0; }
.view-page .activity-table th { text-align: left; padding: 6px 8px; color: var(--fg-3); font-size: var(--fs-cap); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--line-bright); }
.view-page .activity-table td { padding: 6px 8px; border-bottom: 1px solid var(--line); color: var(--fg-1); vertical-align: top; }
.view-page .activity-table .ar-ts { white-space: nowrap; color: var(--fg-3); font-size: var(--fs-cap); width: 6rem; }
.view-page .activity-table .ar-body { color: var(--fg-1); }
.view-page .pager { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0 0; font-size: var(--fs-sm); color: var(--fg-2); }
.view-page .pager button { padding: 4px 12px; background: transparent; color: var(--fg-1); border: 1px solid var(--line-bright); border-radius: 3px; cursor: pointer; font: var(--fs-sm)/1 var(--mono); transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease); }
.view-page .pager button:not(:disabled):hover { color: var(--coral); border-color: var(--coral); }
.view-page .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
.view-page .pager .pg-info strong { color: var(--fg-0); }

.view-page .tiles { list-style: none; padding: 0; margin: 6px 0 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
.view-page .tiles li a { display: block; padding: 10px 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 3px; text-decoration: none; color: var(--fg-1); }
.view-page .tiles li a:hover { border-color: var(--coral); transform: translateY(-1px); }
.view-page .tiles strong { display: block; font-size: var(--fs-h-md); color: var(--fg-0); }
.view-page .tiles span { color: var(--fg-3); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.04em; }

.view-page .anly-grid, .view-page .charts { display: grid; grid-template-columns: 1fr; gap: 14px; margin: 6px 0 14px; align-items: start; }
@media (min-width: 720px) {
  .view-page .anly-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  .view-page .charts    { grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; }
}
.view-page .anly-card, .view-page .inv-card { padding: 12px 14px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 3px; }
.view-page .anly-card { display: flex; flex-direction: column; min-height: 0; max-height: 360px; }
.view-page .trend-card {
  padding: 16px 18px 18px;
  background: var(--bg-1);
  border: 1px solid var(--line-bright);
  border-left: 3px solid var(--coral);
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.view-page .anly-card h3, .view-page .trend-card h3, .view-page .inv-card h3 { font: 600 var(--fs-md)/var(--lh-tight) var(--mono); color: var(--coral); margin: 0; }
.view-page .anly-card .subtitle, .view-page .trend-card .subtitle, .view-page .inv-card .desc { color: var(--fg-2); font-size: var(--fs-sm); margin: 4px 0 0; line-height: var(--lh-body); }
.view-page .trend-head { display: flex; flex-direction: column; gap: 2px; }
.view-page .anly-body { flex: 1 1 auto; min-height: 0; }
.view-page .anly-scroll { max-height: 240px; overflow: auto; padding-right: 4px; }
.view-page .anly-scroll::-webkit-scrollbar { width: 6px; }

/* Horizontal-bar list (used by prefs-by-domain etc) */
.view-page .hbar-list { list-style: none; margin: 0; padding: 0; }
.view-page .hbar-list li { display: grid; grid-template-columns: 1fr 100px 36px; align-items: center; gap: 8px; padding: 4px 0; font-size: var(--fs-sm); }
.view-page .hbar-label { color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-page .hbar-track { background: var(--bg-3); height: 4px; border-radius: 2px; overflow: hidden; }
.view-page .hbar-fill { display: block; height: 100%; background: var(--coral); transition: width 320ms var(--ease); }
.view-page .hbar-count { color: var(--fg-3); text-align: right; font-size: var(--fs-cap); }

/* Domain-confidence compact list */
.view-page .dc-list { list-style: none; margin: 0; padding: 0; }
.view-page .dc-list li { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--line); font-size: var(--fs-sm); }
.view-page .dc-list li:last-child { border-bottom: 0; }
.view-page .dc-domain { color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-page .badge.level-low    { color: var(--orange); border-color: var(--orange); }
.view-page .badge.level-medium { color: var(--fg-1); border-color: var(--line-bright); }
.view-page .badge.level-high   { color: var(--green); border-color: var(--green); }

/* Predictions accuracy callout */
.view-page .prediction-stat { padding: 14px 0 8px; text-align: center; }
.view-page .prediction-pct { font: 600 28px/1 var(--mono); color: var(--coral); }
.view-page .prediction-fraction { color: var(--fg-2); font-size: var(--fs-cap); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

/* Top-corrections refined head */
.view-page .cor-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.view-page .cor-head .cor-meta { color: var(--fg-3); font-size: var(--fs-cap); }

/* Trend card stat row */
.view-page .trend-fixed { color: var(--fg-3); font-style: normal; font-size: var(--fs-cap); margin-left: 6px; }
.view-page .trend-stat { display: flex; align-items: baseline; gap: 8px; padding: 8px 10px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 3px; min-height: 28px; }
.view-page .trend-stat:empty { display: none; }
.view-page .trend-body { padding: 4px 0 0; }
.view-page .stat-num { font: 600 var(--fs-h-md)/1 var(--mono); color: var(--fg-0); }
.view-page .stat-label { color: var(--fg-2); font-size: var(--fs-sm); }
.view-page .stat-meta { color: var(--fg-3); font-size: var(--fs-cap); margin-left: auto; }

.view-page .range-ctl { display: flex; align-items: center; gap: 4px; margin: 6px 0 14px; padding: 6px 0; }
.view-page .range-ctl-label { color: var(--fg-3); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.04em; margin-right: 6px; }
.view-page .range-ctl button { padding: 3px 10px; background: transparent; color: var(--fg-1); border: 1px solid var(--line-bright); border-radius: 3px; cursor: pointer; font: var(--fs-sm)/1 var(--mono); }
.view-page .range-ctl button:hover { color: var(--coral); border-color: var(--coral); }
.view-page .range-ctl button[aria-checked="true"] { color: var(--coral); border-color: var(--coral); background: var(--coral-soft); }

/* Inventory: top summary line and layer tile grid */
.view-page .inv-summary { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin: 6px 0; color: var(--fg-2); font-size: var(--fs-sm); }
.view-page .inv-summary strong { color: var(--fg-0); }
.view-page .inv-summary .sep { color: var(--fg-4); }
.view-page .layer-tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin: 10px 0 18px; }
.view-page .layer-tile { display: block; padding: 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 3px; text-decoration: none; color: var(--fg-1); }
.view-page .layer-tile:hover { border-color: var(--coral); transform: translateY(-1px); }
.view-page .layer-tile-id { color: var(--coral); font: 600 var(--fs-cap)/1 var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.view-page .layer-tile-name { color: var(--fg-0); font-weight: 600; margin-bottom: 4px; }
.view-page .layer-tile-stat { color: var(--fg-3); font-size: var(--fs-cap); }
.view-page .layer-tile-stat strong { color: var(--fg-1); }

.view-page .inv-section { margin: 12px 0; padding: 10px 0; border-top: 1px solid var(--line); }
.view-page .inv-section > summary { cursor: pointer; list-style: none; display: flex; align-items: baseline; gap: 10px; padding: 4px 0; }
.view-page .inv-section > summary::-webkit-details-marker { display: none; }
.view-page .inv-section-id { color: var(--coral); font: 600 var(--fs-cap)/1 var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.view-page .inv-section-name { color: var(--fg-0); font-weight: 600; font-size: var(--fs-md); }
.view-page .inv-section-count { color: var(--fg-3); font-size: var(--fs-cap); margin-left: auto; }
.view-page .inv-section-summary { color: var(--fg-2); font-size: var(--fs-sm); margin: 4px 0 8px; max-width: 78ch; }
.view-page .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; margin: 8px 0 0; }
.view-page .inv-card header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.view-page .inv-card-name { color: var(--fg-0); text-decoration: none; font-weight: 600; }
.view-page .inv-card-name:hover { color: var(--coral); }
.view-page .inv-card .count { color: var(--fg-3); font-size: var(--fs-cap); }
.view-page .inv-card .desc { color: var(--fg-2); font-size: var(--fs-sm); margin: 0 0 6px; }
.view-page .inv-card .inv-sample { margin-top: 4px; }
.view-page .inv-card .inv-sample > summary { cursor: pointer; list-style: none; color: var(--fg-3); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.04em; }
.view-page .inv-card .inv-sample > summary::-webkit-details-marker { display: none; }
.view-page .inv-card .inv-sample > summary::before { content: '› '; transition: transform var(--t-fast) var(--ease); display: inline-block; }
.view-page .inv-card .inv-sample[open] > summary::before { transform: rotate(90deg); }
.view-page .inv-card .empty { color: var(--fg-3); font-style: italic; font-size: var(--fs-sm); }
.view-page .inv-card .sample { margin: 6px 0 0; }

.view-page details.arch-overview { margin: 18px 0 6px; padding: 8px 0; border-top: 1px solid var(--line); }
.view-page details.arch-overview > summary { cursor: pointer; list-style: none; color: var(--fg-3); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0; }
.view-page details.arch-overview > summary::-webkit-details-marker { display: none; }
.view-page details.arch-overview ul { list-style: none; padding: 6px 0 0; margin: 0; }
.view-page details.arch-overview li { padding: 6px 0; color: var(--fg-1); font-size: var(--fs-sm); border-bottom: 1px solid var(--line); }
.view-page details.arch-overview li:last-child { border-bottom: 0; }
.view-page details.arch-overview li strong { color: var(--coral); margin-right: 6px; }
.view-page details.arch-overview li .layer-name { color: var(--fg-0); font-weight: 600; }
.view-page details.arch-overview li p { margin: 4px 0 0; color: var(--fg-2); font-size: var(--fs-sm); max-width: 78ch; }

/* Card renderers (used by Tables-tab cards, Inventory samples, Profile lists). */
.card { padding: 8px 12px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 3px; margin: 6px 0; }
.card .card-h { font-size: var(--fs-cap); color: var(--fg-3); margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; text-transform: uppercase; letter-spacing: 0.04em; }
.card .card-h .ts { text-transform: none; letter-spacing: 0; }
.card .card-body { font-size: var(--fs-sm); color: var(--fg-1); line-height: var(--lh-body); }
.card .card-body p { margin: 2px 0; }
.card .card-body p.title { color: var(--fg-0); font-weight: 600; }
.card .card-body p.rule { color: var(--fg-0); }
.card .card-body p.wgw { color: var(--fg-0); }
.card .card-f { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; font-size: var(--fs-cap); color: var(--fg-3); }
.badge { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: var(--fs-cap); font-family: var(--mono); text-decoration: none; letter-spacing: 0.02em; }
.badge.tag { background: var(--coral-soft); color: var(--coral); }
.badge.origin { background: var(--bg-3); color: var(--fg-1); border: 1px solid var(--line-bright); }
.badge.source { background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--line-bright); }
.badge.kind { background: var(--bg-3); color: var(--fg-1); border: 1px solid var(--line-bright); }
.badge.dom { background: var(--bg-3); color: var(--fg-1); border: 1px solid var(--line-bright); }
.badge.raw { background: var(--bg-3); color: var(--orange); border: 1px solid var(--line-bright); }
.card .chip { display: inline-block; padding: 1px 8px; background: var(--bg-3); border: 1px solid var(--line); border-radius: 999px; font-size: var(--fs-cap); color: var(--fg-2); text-decoration: none; }
.card .chip.cat { color: var(--fg-1); border-color: var(--line-bright); }
.card .rec-chip { color: var(--coral); }
.card .amt.pos { color: var(--fg-0); }
.card .amt.neg { color: var(--green); }
.card .body.trunc { color: var(--fg-1); }
.card .show-more { background: transparent; color: var(--coral); border: 0; cursor: pointer; padding: 0; font-size: var(--fs-cap); }
.card details.json summary { cursor: pointer; color: var(--fg-3); font-size: var(--fs-cap); }
.card details.json pre { white-space: pre-wrap; word-wrap: break-word; max-height: 320px; overflow: auto; background: var(--bg-0); padding: 6px 8px; border-radius: 3px; font-size: var(--fs-code); }

/* Profile page sections inside .t-card.page */
.view-page .profile-meta { color: var(--fg-2); font-size: var(--fs-sm); margin-bottom: 12px; }
.view-page .profile-summary { color: var(--fg-1); font-size: var(--fs-sm); margin-bottom: 14px; }
.view-page .chips-row { display: flex; flex-wrap: wrap; gap: 4px; }
.view-page .chips-row .chip { display: inline-block; padding: 2px 8px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 999px; color: var(--fg-1); font-size: var(--fs-sm); text-decoration: none; }
.view-page .chips-row .chip:hover { border-color: var(--coral); color: var(--coral); }

/* Analysis card content */
.view-page .ac-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
.view-page .ac-table th { color: var(--fg-3); font-weight: 500; text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--line); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.04em; }
.view-page .ac-table td { padding: 4px 6px; border-bottom: 1px solid var(--line); color: var(--fg-1); }
.view-page .tc-list { list-style: none; margin: 0; padding: 0; }
.view-page .tc-list li { padding: 4px 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: var(--fs-sm); border-bottom: 1px solid var(--line); }
.view-page .tc-list li:last-child { border-bottom: 0; }
.view-page .tc-list li a { color: var(--fg-1); text-decoration: none; }
.view-page .tc-list li a:hover { color: var(--coral); }
.view-page .tc-list .count { color: var(--fg-3); font-size: var(--fs-cap); }
.view-page .cor-list { list-style: none; margin: 0; padding: 0; }
.view-page .cor-list li { padding: 6px 0; border-bottom: 1px solid var(--line); font-size: var(--fs-sm); color: var(--fg-1); }
.view-page .cor-list li:last-child { border-bottom: 0; }
.view-page .cor-list li p { margin: 4px 0 0; color: var(--fg-2); font-size: var(--fs-sm); }
.view-page .empty { color: var(--fg-3); font-style: italic; font-size: var(--fs-sm); }

/* Small-multiples (Trends) */
.view-page .sm-row { display: grid; grid-template-columns: 1fr 60px 140px; gap: 8px; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--line); font-size: var(--fs-sm); }
.view-page .sm-row:last-child { border-bottom: 0; }
.view-page .sm-label { color: var(--fg-1); }
.view-page .sm-total { color: var(--fg-3); text-align: right; font-size: var(--fs-cap); }

/* SVG charts */
.chart { display: block; margin: 6px 0; max-width: 100%; color: var(--coral); }
.chart rect { fill: currentColor; }
.chart.stacked rect { fill: inherit; }
.chart-axis { font: var(--fs-cap)/1 var(--mono); fill: var(--fg-3); }
.chart-single { padding: 16px 8px; text-align: center; }
.chart-single-label { color: var(--fg-3); font-size: var(--fs-cap); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.chart-single-value { font: 600 28px/1.1 var(--mono); color: var(--fg-0); }
.chart-single-hint { color: var(--fg-3); font-size: var(--fs-cap); margin-top: 4px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: var(--fs-cap); color: var(--fg-2); margin: 0 0 6px; padding-left: 36px; }
.chart-legend-item { display: inline-flex; align-items: center; gap: 4px; }
.chart-legend-item .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; }

.card-mode-toggle button { padding: 3px 10px; background: transparent; color: var(--fg-1); border: 1px solid var(--line-bright); border-radius: 3px; cursor: pointer; font: var(--fs-sm)/1 var(--mono); }
.card-mode-toggle button[aria-checked="true"] { color: var(--coral); border-color: var(--coral); }

<body class="connecting">

<a href="#editor" class="sr-only">skip to editor</a>

<button id="sidebar-toggle" type="button" aria-label="toggle navigation" aria-controls="sidebar" aria-expanded="false">≡</button>
<div class="scrim" id="scrim" aria-hidden="true"></div>

<main>
  <aside id="sidebar" aria-label="navigation">
    <div class="brand">
      <span class="arrow" aria-hidden="true">▸</span>
      <span>robin db</span>
      <button id="arch-btn" class="about-btn" type="button" aria-label="show memory architecture overview" title="how Robin remembers">about</button>
    </div>
    <div class="meta" role="status" aria-live="polite">
      <div class="row url" id="brand-url">—</div>
      <div class="row">
        <span class="dot" aria-hidden="true"></span>
        <span id="brand-status">connecting</span>
      </div>
      <div class="row" id="brand-tables"></div>
    </div>

    <div id="saved-groups"></div>
    <div class="group tables">
      <h2>tables <span class="count" id="t-count" aria-hidden="true"></span></h2>
      <div class="t-filter-wrap">
        <input class="t-filter" id="t-filter" type="search" placeholder="filter (press /)" aria-label="filter tables and saved queries" autocomplete="off" spellcheck="false">
        <div class="t-filter-counter" id="t-filter-counter" aria-live="polite"></div>
      </div>
      <div id="tables" class="layered"></div>
    </div>
  </aside>

  <section class="editor" id="editor">
    <div class="trail" id="trail" aria-label="recent navigation"></div>
    <div id="table-card-host"></div>
    <div class="editor-wrap">
      <span class="prompt" aria-hidden="true">&gt;</span>
      <textarea
        id="sql"
        spellcheck="false"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        role="combobox"
        aria-autocomplete="list"
        aria-controls="ac-popover"
        aria-expanded="false"
        aria-label="SurrealQL query"
        placeholder="select * from …  ⌘↵ to run"
      ></textarea>
      <div class="ac-popover" id="ac-popover" role="listbox" aria-label="autocomplete suggestions"></div>
    </div>
    <div class="controls">
      <button class="primary" id="run" type="button">
        <span>run</span>
        <kbd aria-hidden="true">⌘↵</kbd>
      </button>
      <button class="secondary hidden" id="cancel" type="button" aria-label="cancel running query">cancel</button>
      <button class="secondary" id="copy" type="button" aria-label="copy results to clipboard" disabled>copy</button>
      <button class="secondary" id="csv" type="button" aria-label="download results as CSV" disabled>csv</button>
      <button class="secondary" id="filter-toggle" type="button" aria-pressed="false" aria-label="toggle column filter row">filter</button>
      <button class="secondary" id="history-btn" type="button" aria-label="open query history">history</button>
      <button class="secondary" id="save-btn" type="button" aria-label="save current query as bookmark">save</button>
      <span class="stats" id="stats" role="status" aria-live="polite"></span>
      <span class="grow"></span>
      <span role="tablist" aria-label="result view">
        <button id="tab-table" role="tab" aria-selected="true" aria-controls="results" type="button">table</button>
        <span class="tab-sep" aria-hidden="true">·</span>
        <button id="tab-json" role="tab" aria-selected="false" aria-controls="results" type="button">json</button>
      </span>
    </div>
    <div id="warn" role="status" aria-live="polite">this query writes data — be sure</div>
    <div class="results" id="results" role="tabpanel" aria-labelledby="tab-table">
      <div class="placeholder">
        <span class="hint" aria-hidden="true">?</span>pick a snapshot, click a table, or type a query
        <span class="kbd-hint"> · <kbd>⌘K</kbd> focus · <kbd>⌘↵</kbd> run</span>
      </div>
    </div>
  </section>
</main>

<div class="overlay" id="arch-overlay" role="dialog" aria-modal="true" aria-labelledby="arch-title" tabindex="-1">
  <div class="overlay-card">
    <button class="close" id="arch-close" type="button" aria-label="close overview">×</button>
    <h1 id="arch-title">—</h1>
    <p class="intro" id="arch-intro"></p>
    <div id="arch-layers"></div>
    <div class="footer-note">Press <kbd>esc</kbd> to close. Click any table chip to jump to its page.</div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
  <div class="modal-card">
    <button class="modal-close" id="modal-close" type="button" aria-label="close dialog">×</button>
    <h2 id="modal-title">—</h2>
    <div id="modal-body"></div>
  </div>
</div>
