name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Cache HuggingFace transformers models
        uses: actions/cache@v4
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: ${{ runner.os }}-hf-transformers-bge-small-en-v1.5
      - name: Generate fixtures
        run: node scripts/gen-fixtures.js
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Lint
        run: npm run lint

  schema-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Parse all .surql files against mem:// (sequential, shared engine)
        run: |
          node -e "
          import('./src/db/client.js').then(async ({connect, close}) => {
            const { readdir, readFile } = await import('node:fs/promises');
            const dir = 'src/schema/migrations';
            const files = (await readdir(dir)).filter(f => f.endsWith('.surql')).sort();
            const db = await connect({ engine: 'mem://' });
            try {
              for (const f of files) {
                const sql = await readFile(dir + '/' + f, 'utf8');
                try { await db.query(sql).collect(); console.log('OK', f); }
                catch (e) { console.error('FAIL', f, e.message); process.exit(1); }
              }
              process.exit(0);
            } finally { await close(db); }
          });
          "
