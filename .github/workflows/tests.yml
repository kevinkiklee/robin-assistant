name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install native build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Smoke
        run: |
          DIR=$(mktemp -d)
          ROBIN_USER_DATA_DIR=$DIR pnpm robin init --yes
          ROBIN_USER_DATA_DIR=$DIR pnpm robin doctor --json | tee /tmp/doctor.json
          # critical fails fail the build
          node -e "const r=require('/tmp/doctor.json'); if(r.summary.fail>0){console.error('doctor failed');process.exit(1)}"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
